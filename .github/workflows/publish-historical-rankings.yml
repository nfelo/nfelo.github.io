name: Publish historical rankings and mobile UI

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install the prepared files
        env:
          UPDATE_ARCHIVE: >-
            
        run: |
          printf '%s' "$UPDATE_ARCHIVE" | base64 --decode > /tmp/network-football-elo-update.tar.xz
          echo "244f3fe68db6dd6e7a938e4287ee1ccdf2788c888349476e3b81953700e164ad  /tmp/network-football-elo-update.tar.xz" | sha256sum --check --strict
          tar -xJf /tmp/network-football-elo-update.tar.xz
          node --check public/assets/app.js
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/pages.yml scripts/model.py scripts/build_site.py public/index.html public/assets/styles.css public/assets/app.js tests/test_build.py
          git rm .github/workflows/publish-historical-rankings.yml
          git commit -m "Add historical rankings and responsive UI improvements"
          git push origin HEAD:main

      - name: Rebuild and deploy the site
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run pages.yml --ref main -f refresh_source=false


