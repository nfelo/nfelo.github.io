name: Apply historical rankings update



on:

  workflow_dispatch:



permissions:

  contents: write

  actions: write



jobs:

  apply:

    runs-on: ubuntu-latest

    steps:

      - name: Check out repository

        uses: actions/checkout@v5

        with:

          fetch-depth: 0



      - name: Apply the prepared update

        env:

          UPDATE_PATCH: >-

            

        run: |

          printf '%s' "$UPDATE_PATCH" | base64 --decode | gzip --decompress > /tmp/network-football-elo.patch

          git apply --check /tmp/network-football-elo.patch

          git apply /tmp/network-football-elo.patch

          git config user.name "github-actions[bot]"

          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .github/workflows/pages.yml scripts/model.py scripts/build_site.py public/index.html public/assets/styles.css public/assets/app.js tests/test_build.py

          git rm .github/workflows/apply-historical-rankings.yml

          git commit -m "Add historical rankings and responsive UI improvements"

          git push origin HEAD:main



      - name: Rebuild and deploy the site

        env:

          GH_TOKEN: ${{ github.token }}

        run: gh workflow run pages.yml --ref main -f refresh_source=false
