    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Verify repository and branch
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_REPOSITORY" = "nfelo/nfelo.github.io"
          test "$GITHUB_REF_NAME" = "main"
          test -f scripts/model.py
          test -f scripts/build_site.py
          test -f public/index.html
          test -f public/social-card.png
          test -f requirements.txt

      - name: Decode, verify and install the complete release
        shell: bash
        run: |
          set -euo pipefail
          printf '%s%s' "$UPDATE_ARCHIVE_1" "$UPDATE_ARCHIVE_2" \
            | tr -d '[:space:]' \
            | base64 --decode > /tmp/nfelo-audited-methodology.tar.xz
          printf '%s  %s\n' "$UPDATE_SHA256" /tmp/nfelo-audited-methodology.tar.xz \
            | sha256sum --check --strict -
          python - <<'PY'
          from pathlib import PurePosixPath
          import tarfile

          archive_path = "/tmp/nfelo-audited-methodology.tar.xz"
          expected = {
              "README.md",
              "docs/model-validation.md",
              "docs/methodology-audit-2026-07-19.md",
              "scripts/model.py",
              "scripts/forecast_layer.py",
              "scripts/build_site.py",
              "public/assets/app.js",
              "public/assets/styles.css",
              "tests/test_build.py",
              "research/methodology-audit-2026-07-19/",
              "research/methodology-audit-2026-07-19/KEY_RESULTS.json",
              "research/methodology-audit-2026-07-19/README.md",
              "research/methodology-audit-2026-07-19/capture_batch_score.py",
              "research/methodology-audit-2026-07-19/capture_deployed.py",
              "research/methodology-audit-2026-07-19/compare_network_selections.py",
              "research/methodology-audit-2026-07-19/evaluate_dixon_coles.py",
              "research/methodology-audit-2026-07-19/evaluate_forecasts.py",
              "research/methodology-audit-2026-07-19/evaluate_gate.py",
              "research/methodology-audit-2026-07-19/evaluate_rankings.py",
              "research/methodology-audit-2026-07-19/network_eval.cpp",
              "research/methodology-audit-2026-07-19/prepare_matches.py",
              "research/methodology-audit-2026-07-19/reorder_matches.py",
              "research/methodology-audit-2026-07-19/search_causal_observation.py",
              "research/methodology-audit-2026-07-19/search_network.py",
              "research/methodology-audit-2026-07-19/search_simultaneous.py",
          }

          with tarfile.open(archive_path, "r:xz") as release:
              members = release.getmembers()
              names = {member.name for member in members}
              if names != expected:
                  missing = sorted(expected - names)
                  extra = sorted(names - expected)
                  raise SystemExit(f"Unexpected release contents; missing={missing}, extra={extra}")
              for member in members:
                  path = PurePosixPath(member.name)
                  if path.is_absolute() or ".." in path.parts:
                      raise SystemExit(f"Unsafe archive path: {member.name}")
                  if member.issym() or member.islnk():
                      raise SystemExit(f"Links are not permitted: {member.name}")
              release.extractall(".", filter="data")
          PY

      - name: Install reproducible runtime
        run: python -m pip install --disable-pip-version-check --requirement requirements.txt

      - name: Verify source syntax and audit assets
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile \
            scripts/model.py \
            scripts/forecast_layer.py \
            scripts/build_site.py \
            tests/test_build.py \
            research/methodology-audit-2026-07-19/*.py
          node --check public/assets/app.js
          g++ -std=c++17 -fsyntax-only research/methodology-audit-2026-07-19/network_eval.cpp
          python -m json.tool research/methodology-audit-2026-07-19/KEY_RESULTS.json > /dev/null

      - name: Replay every result and rebuild the complete site
        run: python scripts/build_site.py --source source --config config --output public

      - name: Run the complete test suite
        run: python -m unittest discover --start-directory tests --verbose

      - name: Verify the public release contract
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path(".")
          summary = json.loads((root / "public/data/summary.json").read_text(encoding="utf-8"))
          validation = summary["validation"]
          assert summary["meta"]["methodology_version"] == "2026-07-19-audited-date-batch"
          assert validation["primary_evidence"] == "nested_historical_holdout"
          assert abs(validation["nested"]["log_loss"] - 0.88421871) < 1e-8
          assert validation["retrospective"]["cutoff"] == "2026-07-11"
          assert validation["retrospective"]["unknown_dates"] == "sequential"
          assert 0.879 < validation["retrospective"]["log_loss"] < 0.883

          app = (root / "public/assets/app.js").read_text(encoding="utf-8")
          readme = (root / "README.md").read_text(encoding="utf-8")
          validation_doc = (root / "docs/model-validation.md").read_text(encoding="utf-8")
          for marker in (
              "function renderMethodology()",
              "const FAQ_ITEMS = [",
              "function renderAbout()",
              "In plain English",
              "Prospective record",
              "Reconciled score probabilities",
          ):
              assert marker in app, marker
          assert app.count('question: "') >= 25
          assert "Strength rating and conservative record score" in app
          assert "retrospective diagnostic" in readme
          assert "Integration erratum" in validation_doc
          PY
          git diff --check -- \
            README.md docs scripts/model.py scripts/forecast_layer.py scripts/build_site.py \
            public/assets/app.js public/assets/styles.css tests/test_build.py \
            research/methodology-audit-2026-07-19

      - name: Commit the complete validated release
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- \
            README.md \
            docs/model-validation.md \
            docs/methodology-audit-2026-07-19.md \
            scripts/model.py \
            scripts/forecast_layer.py \
            scripts/build_site.py \
            public/assets/app.js \
            public/assets/styles.css \
            tests/test_build.py \
            research/methodology-audit-2026-07-19
          if test -f source/prospective_forecasts.jsonl; then
            git add -- source/prospective_forecasts.jsonl
          fi
          git diff --cached --check
          if git diff --cached --quiet; then
            echo "The audited release is already installed; nothing to commit."
            exit 0
          fi
          git commit -m "Install audited date-batch methodology"
          git restore --worktree .

          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main
            if git push origin HEAD:main; then
              echo "Complete release pushed. The existing Pages workflow will now rebuild and deploy it."
              exit 0
            fi
            if test "$attempt" -lt 3; then
              echo "Push raced another update; retrying after refreshing main."
              sleep 5
            fi
          done
          echo "Unable to push the validated release after three attempts." >&2
          exit 1
