name: Fix World Cup history deployment test

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/fix-world-cup-history-test.yml"

permissions:
  contents: write

concurrency:
  group: fix-world-cup-history-test
  cancel-in-progress: false

jobs:
  fix:
    name: Update dropdown order and test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Apply hotfix
        shell: bash
        run: |
          set -euo pipefail

          python <<'PY'
          from pathlib import Path


          APP_PATH = Path("public/assets/app.js")
          TEST_PATH = Path("tests/test_build.py")


          def replace_once(
              text: str,
              old: str,
              new: str,
              description: str,
          ) -> str:
              count = text.count(old)

              if count == 0 and new in text:
                  print(f"{description} is already fixed.")
                  return text

              if count != 1:
                  raise RuntimeError(
                      f"Expected exactly one {description}; found {count}"
                  )

              return text.replace(old, new, 1)


          app = APP_PATH.read_text(encoding="utf-8")

          old_dropdown = (
              '${index.world_cups.flatMap((cup) => ['
              '`<option value="${cup.year}-before">Before ${cup.year} World Cup</option>`, '
              '`<option value="${cup.year}-after">After ${cup.year} World Cup</option>`'
              ']).join("")}'
          )

          new_dropdown = (
              '${index.world_cups.flatMap((cup) => ['
              '`<option value="${cup.year}-after">After ${cup.year} World Cup</option>`, '
              '`<option value="${cup.year}-before">Before ${cup.year} World Cup</option>`'
              ']).join("")}'
          )

          app = replace_once(
              app,
              old_dropdown,
              new_dropdown,
              "World Cup dropdown order",
          )

          APP_PATH.write_text(app, encoding="utf-8")


          tests = TEST_PATH.read_text(encoding="utf-8")

          old_test = (
              '        after = \'`<option value="${cup.after}">After ${cup.year} World Cup</option>`\'\n'
              '        before = \'`<option value="${cup.before}">Before ${cup.year} World Cup</option>`\'\n'
              '        self.assertLess(javascript.index(after), javascript.index(before))\n'
          )

          new_test = (
              '        after = \'`<option value="${cup.year}-after">After ${cup.year} World Cup</option>`\'\n'
              '        before = \'`<option value="${cup.year}-before">Before ${cup.year} World Cup</option>`\'\n'
              '        self.assertLess(javascript.index(after), javascript.index(before))\n'
          )

          tests = replace_once(
              tests,
              old_test,
              new_test,
              "World Cup dropdown test expectations",
          )

          TEST_PATH.write_text(tests, encoding="utf-8")


          final_app = APP_PATH.read_text(encoding="utf-8")
          final_tests = TEST_PATH.read_text(encoding="utf-8")

          after_marker = (
              '`<option value="${cup.year}-after">'
              'After ${cup.year} World Cup</option>`'
          )
          before_marker = (
              '`<option value="${cup.year}-before">'
              'Before ${cup.year} World Cup</option>`'
          )

          for marker in (after_marker, before_marker):
              if marker not in final_app:
                  raise RuntimeError(
                      f"Missing dropdown marker in app.js: {marker}"
                  )

              if marker not in final_tests:
                  raise RuntimeError(
                      f"Missing test marker in test_build.py: {marker}"
                  )

          if final_app.index(after_marker) >= final_app.index(before_marker):
              raise RuntimeError(
                  "After World Cup option must appear before Before World Cup"
              )

          print("World Cup history deployment test hotfix applied.")
          PY

      - name: Validate JavaScript
        run: node --check public/assets/app.js

      - name: Run affected test
        run: |
          python -m unittest \
            tests.test_build.StaticBuildTests.test_history_date_mask_and_world_cup_order \
            --verbose

      - name: Check changes
        run: |
          set -euo pipefail
          git diff --check
          git diff -- public/assets/app.js tests/test_build.py

      - name: Commit and push hotfix
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- \
            public/assets/app.js \
            tests/test_build.py
          then
            echo "The World Cup history test is already fixed."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            public/assets/app.js \
            tests/test_build.py

          git commit -m "Fix World Cup history deployment test"
          git push origin HEAD:main
