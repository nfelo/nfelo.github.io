name: Improve team search aliases and dynamic suggestions

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: improve-team-search-aliases
  cancel-in-progress: false

jobs:
  install:
    name: Install search and sorting improvements
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Check out main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install reproducible runtime
        run: python -m pip install --requirement requirements.txt

      - name: Patch aliases, suggestions and tournament sorting
        shell: bash
        run: |
          set -euo pipefail

          python <<'PY'
          from pathlib import Path
          import re


          APP_PATH = Path("public/assets/app.js")
          BUILD_PATH = Path("scripts/build_site.py")
          TEST_PATH = Path("tests/test_build.py")

          app = APP_PATH.read_text(encoding="utf-8")
          build = BUILD_PATH.read_text(encoding="utf-8")
          tests = TEST_PATH.read_text(encoding="utf-8")


          def replace_once(
              text: str,
              old: str,
              new: str,
              description: str,
          ) -> str:
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(
                      f"Expected exactly one {description}; found {count}"
                  )
              return text.replace(old, new, 1)


          alias_marker = "MANUAL_TEAM_ALIAS_GROUPS: tuple[tuple[str, ...], ...]"
          if alias_marker not in build:
              alias_code = r'''
          PUBLIC_TEAM_NAME_REPLACEMENTS = {
              "USSR": "Soviet Union",
          }

          MANUAL_TEAM_ALIAS_GROUPS: tuple[tuple[str, ...], ...] = (
              (
                  "Russia",
                  "Soviet Union",
                  "USSR",
                  "Russian Empire",
              ),
              (
                  "Germany",
                  "West Germany",
                  "East Germany",
                  "German Empire",
              ),
              ("Eswatini", "Swaziland"),
              (
                  "Czechia",
                  "Czech Republic",
                  "Czechoslovakia",
              ),
              (
                  "Serbia",
                  "Yugoslavia",
                  "Serbia and Montenegro",
              ),
              (
                  "North Macedonia",
                  "Macedonia",
                  "FYR Macedonia",
              ),
              ("Myanmar", "Burma"),
              ("Cabo Verde", "Cape Verde"),
              ("Timor-Leste", "East Timor"),
              ("Türkiye", "Turkey"),
              (
                  "DR Congo",
                  "Zaire",
                  "Congo DR",
                  "Democratic Republic of the Congo",
              ),
              (
                  "Ivory Coast",
                  "Côte d'Ivoire",
                  "Cote d'Ivoire",
              ),
              (
                  "United States",
                  "USA",
                  "United States of America",
              ),
              (
                  "South Korea",
                  "Korea Republic",
                  "Republic of Korea",
              ),
              (
                  "North Korea",
                  "Korea DPR",
                  "DPR Korea",
              ),
              ("Chinese Taipei", "Taiwan"),
              ("Hong Kong", "Hong Kong, China"),
              ("Macau", "Macao"),
              ("Palestine", "Palestinian Territories"),
          )


          def public_team_name(value: Any) -> Any:
              if isinstance(value, str):
                  return PUBLIC_TEAM_NAME_REPLACEMENTS.get(value, value)
              return value


          def normalise_public_team_names(value: Any) -> Any:
              if isinstance(value, dict):
                  for key, item in list(value.items()):
                      value[key] = normalise_public_team_names(item)
                  return value
              if isinstance(value, list):
                  for index, item in enumerate(value):
                      value[index] = normalise_public_team_names(item)
                  return value
              if isinstance(value, tuple):
                  return tuple(
                      normalise_public_team_names(item)
                      for item in value
                  )
              return public_team_name(value)


          def attach_team_aliases(
              output: Any,
              source: Path,
          ) -> None:
              aliases: dict[str, set[str]] = {}
              for match in output.matches:
                  for code_key, name_key in (
                      ("a", "an"),
                      ("b", "bn"),
                  ):
                      code = str(match.get(code_key, ""))
                      name = str(
                          public_team_name(match.get(name_key, ""))
                      ).strip()
                      if code and name:
                          aliases.setdefault(code, set()).add(name)

              source_names = source / "en.teams.tsv"
              if source_names.exists():
                  for line in source_names.read_text(
                      encoding="utf-8",
                  ).splitlines():
                      fields = [
                          field.strip()
                          for field in line.split("\t")
                          if field.strip()
                      ]
                      if len(fields) < 2:
                          continue
                      code, *names = fields
                      if code.endswith("_loc"):
                          continue
                      aliases.setdefault(code, set()).update(
                          public_team_name(name)
                          for name in names
                      )

              current_names = {
                  team["code"]: public_team_name(team["nation"])
                  for team in output.summary["teams"]
              }
              for code, name in current_names.items():
                  aliases.setdefault(code, set()).add(str(name))

              folded_by_code = {
                  code: {
                      str(value).casefold()
                      for value in values
                  }
                  for code, values in aliases.items()
              }
              for group in MANUAL_TEAM_ALIAS_GROUPS:
                  folded_group = {
                      value.casefold() for value in group
                  }
                  matching_codes = [
                      code
                      for code, values in folded_by_code.items()
                      if values & folded_group
                  ]
                  for code in matching_codes:
                      aliases[code].update(group)

              alias_rows = {
                  code: sorted(
                      {
                          str(alias).strip()
                          for alias in values
                          if str(alias).strip()
                      },
                      key=lambda alias: alias.casefold(),
                  )
                  for code, values in aliases.items()
              }

              for collection_name in ("teams", "current"):
                  for team in output.summary.get(
                      collection_name,
                      [],
                  ):
                      code = team["code"]
                      team["nation"] = public_team_name(
                          team["nation"]
                      )
                      team["aliases"] = alias_rows.get(
                          code,
                          [team["nation"]],
                      )
          '''
              anchor = "\n\ndef write_json(path: Path, value: Any) -> None:\n"
              if build.count(anchor) != 1:
                  raise RuntimeError(
                      "Could not locate the build helper insertion point."
                  )
              build = build.replace(
                  anchor,
                  alias_code + anchor,
                  1,
              )

          build = build.replace(
              'preferred_historical_names = {"Soviet Union": "USSR"}',
              'preferred_historical_names = {"USSR": "Soviet Union"}',
          )

          replay_anchor = '''    output = run_replay(args.source, args.config)
              data = args.output / "data"
          '''
          replay_replacement = '''    output = run_replay(args.source, args.config)
              normalise_public_team_names(output.summary)
              normalise_public_team_names(output.team_pages)
              normalise_public_team_names(output.matches)
              attach_team_aliases(output, args.source)
              data = args.output / "data"
          '''
          if "attach_team_aliases(output, args.source)" not in build:
              build = replace_once(
                  build,
                  replay_anchor,
                  replay_replacement,
                  "model replay setup",
              )

          if "let teamAliasSearch = new Map();" not in app:
              app = replace_once(
                  app,
                  "  let catalog;\n",
                  "  let catalog;\n"
                  "  let teamAliasSearch = new Map();\n",
                  "application state declarations",
              )

          helper_marker = "const initialiseTeamAliasSearch = () => {"
          if helper_marker not in app:
              helper_code = r'''
            const publicTeamName = (value) => (
              String(value ?? "") === "USSR"
                ? "Soviet Union"
                : String(value ?? "")
            );
            const foldSearch = (value) => (
              publicTeamName(value)
                .normalize("NFKD")
                .replace(/[\u0300-\u036f]/g, "")
                .toLocaleLowerCase()
                .replace(/\s+/g, " ")
                .trim()
            );
            const shuffledExamples = (values, limit = 3) => {
              const names = [
                ...new Set(
                  values
                    .map(publicTeamName)
                    .map((value) => value.trim())
                    .filter(Boolean),
                ),
              ];
              for (
                let index = names.length - 1;
                index > 0;
                index -= 1
              ) {
                const swapIndex = Math.floor(
                  Math.random() * (index + 1),
                );
                [names[index], names[swapIndex]] = [
                  names[swapIndex],
                  names[index],
                ];
              }
              const examples = names.slice(
                0,
                Math.min(limit, names.length),
              );
              return examples.length
                ? (
                  examples.join(", ")
                  + (examples.length < names.length ? "…" : "")
                )
                : "";
            };
            const initialiseTeamAliasSearch = () => {
              teamAliasSearch = new Map(
                summary.teams.map((team) => [
                  team.code,
                  foldSearch(
                    [
                      team.nation,
                      ...(team.aliases || []),
                      team.code,
                    ].join(" "),
                  ),
                ]),
              );
            };
            const teamSearchText = (code, ...names) => (
              foldSearch(
                [
                  teamAliasSearch.get(code) || "",
                  ...names.map(publicTeamName),
                ].join(" "),
              )
            );
          '''
              app = replace_once(
                  app,
                  '  const escapeHTML = (value) => String(value ?? "")\n',
                  helper_code
                  + '\n  const escapeHTML = (value) => String(value ?? "")\n',
                  "HTML escape helper",
              )

          app = app.replace(
              'const teamLink = (code, name, date = "") => '
              '`<a class="team-link" href="${teamURL(code, date)}">'
              '${escapeHTML(name)}</a>`;',
              'const teamLink = (code, name, date = "") => '
              '`<a class="team-link" href="${teamURL(code, date)}">'
              '${escapeHTML(publicTeamName(name))}</a>`;',
          )

          route_load = (
              '      if (!summary) [summary, catalog] = await '
              'Promise.all([getJSON("data/summary.json"), '
              'getJSON("data/catalog.json")]);\n'
          )
          route_load_replacement = (
              route_load
              + '      if (!teamAliasSearch.size) '
              'initialiseTeamAliasSearch();\n'
          )
          if "if (!teamAliasSearch.size)" not in app:
              app = replace_once(
                  app,
                  route_load,
                  route_load_replacement,
                  "route data loading",
              )

          app = app.replace(
              'placeholder="Spain, Argentina, Japan…"',
              'placeholder="Search current teams…"',
          )
          rankings_setup = '''    const target = document.getElementById("rankings-table");
              let pool = route.query.get("pool") === "all" ? "all" : "current";
          '''
          rankings_setup_new = '''    const target = document.getElementById("rankings-table");
              document.getElementById("ranking-search").placeholder = (
                shuffledExamples(
                  summary.current.map((team) => team.nation),
                )
                || "Search current teams…"
              );
              let pool = route.query.get("pool") === "all" ? "all" : "current";
          '''
          if "summary.current.map((team) => team.nation)" not in app:
              app = replace_once(
                  app,
                  rankings_setup,
                  rankings_setup_new,
                  "Rankings placeholder setup",
              )

          app = app.replace(
              'const query = document.getElementById("ranking-search")'
              '.value.trim().toLocaleLowerCase();',
              'const query = foldSearch('
              'document.getElementById("ranking-search").value);',
          )
          app = app.replace(
              'const filtered = source.filter((team) => '
              'team.nation.toLocaleLowerCase().includes(query));',
              'const filtered = source.filter((team) => '
              'teamSearchText(team.code, team.nation).includes(query));',
          )

          app = app.replace(
              'placeholder="Brazil, Hungary, Morocco…"',
              'placeholder="Search teams on this date…"',
          )
          app = app.replace(
              'const query = document.getElementById("history-search")'
              '.value.trim().toLocaleLowerCase();',
              'const query = foldSearch('
              'document.getElementById("history-search").value);',
          )
          app = app.replace(
              'const visible = teams.filter((team) => '
              'team.nation.toLocaleLowerCase().includes(query));',
              'const visible = teams.filter((team) => '
              'teamSearchText(team.code, team.nation).includes(query));',
          )

          history_loaded = '''      teams = await loadHistoricalSnapshot(index, chosen);
                document.getElementById("history-count").textContent = number(teams.length);
          '''
          history_loaded_new = '''      teams = await loadHistoricalSnapshot(index, chosen);
                document.getElementById("history-search").placeholder = (
                  shuffledExamples(
                    teams.map((team) => team.nation),
                  )
                  || "Search teams on this date…"
                );
                document.getElementById("history-count").textContent = number(teams.length);
          '''
          history_section = app[
              app.find("async function renderHistory"):
              app.find("function tournamentChangeHTML")
          ]
          if "teams.map((team) => team.nation)" not in history_section:
              app = replace_once(
                  app,
                  history_loaded,
                  history_loaded_new,
                  "History snapshot completion",
              )

          app = app.replace(
              '<option value="rating_change">Rating change</option>'
              '<option value="name">Name</option>',
              '<option value="rating_change">Rating change</option>'
              '<option value="rank_change">Rank change</option>'
              '<option value="name">Name</option>',
          )
          app = app.replace(
              'new Set(["rating", "rating_change", "name"])',
              'new Set(['
              '"rating", "rating_change", "rank_change", "name"'
              '])',
          )

          rating_change_sort = '''        if (sort === "rating_change") {
                    return (
                      descendingValue(b, "tournament_rating_change")
                      - descendingValue(a, "tournament_rating_change")
                      || a.nation.localeCompare(b.nation)
                    );
                  }
          '''
          rank_change_sort = rating_change_sort + '''        if (sort === "rank_change") {
                    return (
                      descendingValue(b, "tournament_rank_change")
                      - descendingValue(a, "tournament_rank_change")
                      || a.nation.localeCompare(b.nation)
                    );
                  }
          '''
          if 'if (sort === "rank_change")' not in app:
              app = replace_once(
                  app,
                  rating_change_sort,
                  rank_change_sort,
                  "Tournament rating-change sorting",
              )

          app = app.replace(
              'participant.nation\n'
              '                    || summaryNames.get(participant.code)',
              'publicTeamName(participant.nation)\n'
              '                    || publicTeamName('
              'summaryNames.get(participant.code))',
          )

          if "search_names: teamSearchText(" not in app:
              tournament_search_pattern = re.compile(
                  r'(?P<indent>^[ \t]*)search_names:\s*\[\s*'
                  r'team\.nation,\s*'
                  r'historicalParticipantNames\.get\(team\.code\),\s*'
                  r'summaryNames\.get\(team\.code\),\s*'
                  r'team\.code,\s*'
                  r'\]\s*'
                  r'\.filter\(Boolean\)\s*'
                  r'\.join\(" "\)\s*'
                  r'\.toLocaleLowerCase\(\),',
                  flags=re.MULTILINE,
              )

              def replace_tournament_search(
                  match: re.Match[str],
              ) -> str:
                  indent = match.group("indent")
                  return (
                      f"{indent}search_names: teamSearchText(\n"
                      f"{indent}  team.code,\n"
                      f"{indent}  team.nation,\n"
                      f"{indent}  historicalParticipantNames.get("
                      "team.code),\n"
                      f"{indent}  summaryNames.get(team.code),\n"
                      f"{indent}),"
                  )

              app, tournament_search_replacements = (
                  tournament_search_pattern.subn(
                      replace_tournament_search,
                      app,
                      count=1,
                  )
              )
              if tournament_search_replacements != 1:
                  raise RuntimeError(
                      "Expected exactly one Tournament alias search "
                      "block; replaced "
                      f"{tournament_search_replacements}."
                  )

          app = app.replace(
              '<select id="match-team"><option value="">Any team</option>'
              '${summary.teams.map((team) => '
              '`<option value="${escapeHTML(team.code)}" '
              '${team.code === requestedTeam ? "selected" : ""}>'
              '${escapeHTML(team.nation)}</option>`).join("")}</select>',
              '<select id="match-team">'
              '<option value="">Any team</option></select>',
          )
          app = app.replace(
              'placeholder="World Cup, England, qualifier…"',
              'placeholder="Competition, team or match class…"',
          )

          match_helpers_marker = "const populateMatchTeamOptions = (matches"
          if match_helpers_marker not in app:
              match_helpers = r'''    const currentNames = new Map(
                summary.teams.map(
                  (team) => [team.code, publicTeamName(team.nation)],
                ),
              );
              const majorTeamCodes = new Set([
                "AR", "BE", "BR", "DE", "EN", "ES", "FR",
                "HR", "IT", "MX", "NL", "PT", "RU", "UY",
              ]);
              const majorCompetitionTokens = [
                "world cup",
                "european championship",
                "euro ",
                "copa america",
                "copa américa",
                "africa cup",
                "asian cup",
                "gold cup",
                "nations cup",
                "confederations cup",
                "olympic",
              ];

              const populateMatchTeamOptions = (
                matches,
                preferredCode,
                selectedEra,
              ) => {
                const namesByCode = new Map();
                const addName = (code, name, matchDate) => {
                  const displayName = publicTeamName(name).trim();
                  if (!code || !displayName) return;
                  if (!namesByCode.has(code)) {
                    namesByCode.set(code, []);
                  }
                  namesByCode.get(code).push({
                    name: displayName,
                    date: matchDate,
                  });
                };
                matches.forEach((match) => {
                  addName(match.a, match.an, match.date);
                  addName(match.b, match.bn, match.date);
                });

                const options = [...namesByCode.entries()]
                  .map(([code, occurrences]) => {
                    const latestByName = new Map();
                    occurrences.forEach(({ name, date }) => {
                      const previous = latestByName.get(name) || "";
                      if (date > previous) {
                        latestByName.set(name, date);
                      }
                    });
                    const historicalNames = [
                      ...latestByName.entries(),
                    ]
                      .sort(
                        (first, second) => (
                          second[1].localeCompare(first[1])
                          || first[0].localeCompare(second[0])
                        ),
                      )
                      .map(([name]) => name);
                    const currentName = currentNames.get(code);
                    const primary = selectedEra === "all"
                      ? (
                        currentName
                        || historicalNames[0]
                        || code
                      )
                      : (
                        historicalNames[0]
                        || currentName
                        || code
                      );
                    const aliases = historicalNames.filter(
                      (name) => name !== primary,
                    );
                    const label = aliases.length
                      ? `${primary} (incl. ${aliases.join(", ")})`
                      : primary;
                    return { code, label };
                  })
                  .sort(
                    (first, second) => (
                      first.label.localeCompare(second.label)
                      || first.code.localeCompare(second.code)
                    ),
                  );

                const select = document.getElementById("match-team");
                select.innerHTML = (
                  '<option value="">Any team</option>'
                  + options.map(
                    (team) => (
                      `<option value="${escapeHTML(team.code)}">`
                      + `${escapeHTML(team.label)}</option>`
                    ),
                  ).join("")
                );
                select.value = options.some(
                  (team) => team.code === preferredCode,
                )
                  ? preferredCode
                  : "";
              };

              const updateMatchSearchPlaceholder = (matches) => {
                const competitions = [
                  ...new Set(
                    matches
                      .map((match) => match.t)
                      .filter(Boolean),
                  ),
                ];
                const majorCompetitions = competitions.filter(
                  (competition) => {
                    const folded = foldSearch(competition);
                    return majorCompetitionTokens.some(
                      (token) => folded.includes(token),
                    );
                  },
                );

                const teamCounts = new Map();
                const latestTeamNames = new Map();
                const rememberTeam = (
                  code,
                  name,
                  matchDate,
                ) => {
                  teamCounts.set(
                    code,
                    (teamCounts.get(code) || 0) + 1,
                  );
                  const previous = latestTeamNames.get(code);
                  if (!previous || matchDate > previous.date) {
                    latestTeamNames.set(code, {
                      date: matchDate,
                      name: publicTeamName(name),
                    });
                  }
                };
                matches.forEach((match) => {
                  rememberTeam(
                    match.a,
                    match.an,
                    match.date,
                  );
                  rememberTeam(
                    match.b,
                    match.bn,
                    match.date,
                  );
                });
                const presentMajorTeams = [
                  ...teamCounts.keys(),
                ].filter((code) => majorTeamCodes.has(code));
                const fallbackTeam = [
                  ...teamCounts.entries(),
                ].sort(
                  (first, second) => (
                    second[1] - first[1]
                    || first[0].localeCompare(second[0])
                  ),
                )[0]?.[0];
                const teamCode = presentMajorTeams.length
                  ? presentMajorTeams[
                    Math.floor(
                      Math.random() * presentMajorTeams.length
                    )
                  ]
                  : fallbackTeam;
                const teamName = teamCode
                  ? (
                    latestTeamNames.get(teamCode)?.name
                    || currentNames.get(teamCode)
                  )
                  : "";
                const competition = majorCompetitions.length
                  ? majorCompetitions[
                    Math.floor(
                      Math.random() * majorCompetitions.length
                    )
                  ]
                  : "";
                const classExample = Math.random() < 0.5
                  ? "qualifier"
                  : "friendly";
                const examples = [
                  competition,
                  teamName,
                  classExample,
                ].filter(Boolean);
                document.getElementById(
                  "match-search",
                ).placeholder = examples.length
                  ? `${examples.join(", ")}…`
                  : "Competition, team or match class…";
              };

          '''
              app = replace_once(
                  app,
                  "    const saveMatchesRoute = () => "
                  'replaceRouteQuery("matches", {\n',
                  match_helpers
                  + "    const saveMatchesRoute = () => "
                  'replaceRouteQuery("matches", {\n',
                  "Matches route persistence",
              )

          old_load = '''    const load = async () => {
                const decade = document.getElementById("match-decade").value;
                loadingTable();
                if (decade === "all") {
                  rows = (await getJSON("data/matches/search.json")).matches.slice().reverse();
                } else {
                  rows = (await getJSON(`data/matches/${decade}.json`)).matches.slice().reverse();
                }
                await update();
              };
          '''
          new_load = '''    const load = async () => {
                const decade = document.getElementById("match-decade").value;
                const preferredTeam = (
                  document.getElementById("match-team").value
                  || requestedTeam
                );
                loadingTable();
                if (decade === "all") {
                  rows = (await getJSON("data/matches/search.json")).matches.slice().reverse();
                } else {
                  rows = (await getJSON(`data/matches/${decade}.json`)).matches.slice().reverse();
                }
                populateMatchTeamOptions(
                  rows,
                  preferredTeam,
                  decade,
                );
                updateMatchSearchPlaceholder(rows);
                await update();
              };
          '''
          matches_section = app[
              app.find("async function renderMatches"):
              app.find("function matchSite")
          ]
          if "populateMatchTeamOptions(" not in matches_section:
              app = replace_once(
                  app,
                  old_load,
                  new_load,
                  "Matches data loader",
              )

          app = app.replace(
              'const query = document.getElementById("match-search")'
              '.value.trim().toLocaleLowerCase();',
              'const query = foldSearch('
              'document.getElementById("match-search").value);',
          )
          old_match_query = '''        if (query && !`${match.an} ${match.bn} ${match.ac} ${match.bc} ${match.t}`.toLocaleLowerCase().includes(query)) return false;
          '''
          new_match_query = '''        const matchSearch = foldSearch(
                  [
                    teamSearchText(
                      match.a,
                      match.an,
                      match.ac,
                    ),
                    teamSearchText(
                      match.b,
                      match.bn,
                      match.bc,
                    ),
                    match.t,
                    Number(match.level) === 0
                      ? "friendly"
                      : "competitive",
                  ].join(" "),
                );
                if (query && !matchSearch.includes(query)) {
                  return false;
                }
          '''
          if "const matchSearch = foldSearch(" not in app:
              app = replace_once(
                  app,
                  old_match_query,
                  new_match_query,
                  "Matches alias filtering",
              )

          app = app.replace(
              '<b>${escapeHTML(match.an)}</b>',
              '<b>${escapeHTML(publicTeamName(match.an))}</b>',
          )
          app = app.replace(
              '<b>${escapeHTML(match.bn)}</b>',
              '<b>${escapeHTML(publicTeamName(match.bn))}</b>',
          )

          app = app.replace(
              'const query = document.getElementById("fixture-search")'
              '.value.trim().toLocaleLowerCase();',
              'const query = foldSearch('
              'document.getElementById("fixture-search").value);',
          )
          old_fixture_filter = (
              'return !query || `${fixture.team1_name} '
              '${fixture.team2_name} ${fixture.tournament_name}`'
              '.toLocaleLowerCase().includes(query);'
          )
          new_fixture_filter = (
              'return !query || foldSearch([\n'
              '          teamSearchText(\n'
              '            fixture.team1_code,\n'
              '            fixture.team1_name,\n'
              '          ),\n'
              '          teamSearchText(\n'
              '            fixture.team2_code,\n'
              '            fixture.team2_name,\n'
              '          ),\n'
              '          fixture.tournament_name,\n'
              '        ].join(" ")).includes(query);'
          )
          fixtures_section = app[
              app.find("async function renderFixtures"):
              app.find("function comparisonChart")
          ]
          if "teamSearchText(" not in fixtures_section:
              app = replace_once(
                  app,
                  old_fixture_filter,
                  new_fixture_filter,
                  "Upcoming alias filtering",
              )

          app = app.replace(
              'const query = document\n'
              '        .getElementById("number-one-team")\n'
              '        .value.trim()\n'
              '        .toLocaleLowerCase();',
              'const query = foldSearch(\n'
              '        document.getElementById("number-one-team").value,\n'
              '      );',
          )
          app = app.replace(
              'query\n'
              '            && !row.nation\n'
              '              .toLocaleLowerCase()\n'
              '              .includes(query)',
              'query\n'
              '            && !teamSearchText(\n'
              '              row.code,\n'
              '              row.nation,\n'
              '            ).includes(query)',
          )

          app = app.replace(
              'bestTournamentAliases.get(row.code).add(row.nation);',
              'bestTournamentAliases.get(row.code).add(\n'
              '          publicTeamName(row.nation),\n'
              '        );',
          )
          app = app.replace(
              '(team) => [team.code, team.nation],',
              '(team) => [team.code, publicTeamName(team.nation)],',
          )

          tests = tests.replace(
              '"Swipe to see every column"',
              '"Swipe horizontally to see all columns"',
          )

          tests = tests.replace(
              '        self.assertIn("USSR", names)\n',
              (
                  '        self.assertIn("Soviet Union", names)\n'
                  '        self.assertNotIn("USSR", names)\n'
              ),
          )

          old_tournament_sort_assertion = (
              '        self.assertIn(\n'
              '            \'<option value="rating">Rating</option>\'\n'
              '            \'<option value="rating_change">Rating change</option>\'\n'
              '            \'<option value="name">Name</option>\',\n'
              '            javascript,\n'
              '        )\n'
          )
          new_tournament_sort_assertion = (
              '        self.assertIn(\n'
              '            \'<option value="rating">Rating</option>\'\n'
              '            \'<option value="rating_change">Rating change</option>\'\n'
              '            \'<option value="rank_change">Rank change</option>\'\n'
              '            \'<option value="name">Name</option>\',\n'
              '            javascript,\n'
              '        )\n'
          )
          if new_tournament_sort_assertion not in tests:
              count = tests.count(old_tournament_sort_assertion)
              if count != 1:
                  raise RuntimeError(
                      "Expected exactly one legacy Tournament sort "
                      f"assertion; found {count}"
                  )
              tests = tests.replace(
                  old_tournament_sort_assertion,
                  new_tournament_sort_assertion,
                  1,
              )


          test_name = (
              "def test_alias_search_dynamic_suggestions_and_rank_sort"
          )
          if test_name not in tests:
              marker = (
                  "    def test_public_metadata_and_discovery_files"
                  "(self) -> None:\n"
              )
              test_method = r'''    def test_alias_search_dynamic_suggestions_and_rank_sort(self) -> None:
                  javascript = (
                      ROOT / "public" / "assets" / "app.js"
                  ).read_text(encoding="utf-8")
                  builder = (
                      ROOT / "scripts" / "build_site.py"
                  ).read_text(encoding="utf-8")

                  for phrase in (
                      "MANUAL_TEAM_ALIAS_GROUPS",
                      '"USSR": "Soviet Union"',
                      "attach_team_aliases(output, args.source)",
                  ):
                      self.assertIn(phrase, builder)

                  for phrase in (
                      "const foldSearch",
                      "const shuffledExamples",
                      "const initialiseTeamAliasSearch",
                      "teamSearchText(team.code, team.nation)",
                      'value="rank_change">Rank change',
                      'if (sort === "rank_change")',
                      "const populateMatchTeamOptions",
                      "const updateMatchSearchPlaceholder",
                      "publicTeamName(match.an)",
                      "fixture.team1_code",
                  ):
                      self.assertIn(phrase, javascript)

                  self.assertIn(
                      "aliases",
                      self.summary["teams"][0],
                  )
                  aliases = {
                      alias
                      for team in self.summary["teams"]
                      for alias in team.get("aliases", [])
                  }
                  self.assertIn("USSR", aliases)
                  self.assertIn("Soviet Union", aliases)
                  self.assertIn("Swaziland", aliases)
                  self.assertNotIn(
                      '"nation":"USSR"',
                      (
                          ROOT
                          / "public"
                          / "data"
                          / "summary.json"
                      ).read_text(encoding="utf-8"),
                  )

          '''
              if tests.count(marker) != 1:
                  raise RuntimeError(
                      "Could not locate the test insertion point."
                  )
              tests = tests.replace(
                  marker,
                  test_method + marker,
                  1,
              )

          required_app = (
              "const foldSearch",
              "const shuffledExamples",
              "const initialiseTeamAliasSearch",
              "summary.current.map((team) => team.nation)",
              'value="rank_change">Rank change',
              'if (sort === "rank_change")',
              "const populateMatchTeamOptions",
              "const updateMatchSearchPlaceholder",
              "const matchSearch = foldSearch(",
          )
          missing_app = [
              marker for marker in required_app
              if marker not in app
          ]
          if missing_app:
              raise RuntimeError(
                  "Browser patch incomplete; missing: "
                  + ", ".join(missing_app)
              )

          required_build = (
              alias_marker,
              "attach_team_aliases(output, args.source)",
              '"USSR": "Soviet Union"',
          )
          missing_build = [
              marker for marker in required_build
              if marker not in build
          ]
          if missing_build:
              raise RuntimeError(
                  "Build patch incomplete; missing: "
                  + ", ".join(missing_build)
              )

          required_test_contracts = (
              'self.assertIn("Soviet Union", names)',
              'self.assertNotIn("USSR", names)',
              '<option value="rank_change">Rank change</option>',
          )
          missing_test_contracts = [
              marker for marker in required_test_contracts
              if marker not in tests
          ]
          if missing_test_contracts:
              raise RuntimeError(
                  "Test migration incomplete; missing: "
                  + ", ".join(missing_test_contracts)
              )

          APP_PATH.write_text(
              app.rstrip() + "\n",
              encoding="utf-8",
          )
          BUILD_PATH.write_text(
              build.rstrip() + "\n",
              encoding="utf-8",
          )
          TEST_PATH.write_text(
              tests.rstrip() + "\n",
              encoding="utf-8",
          )

          print(
              "Installed shared team aliases, dynamic search examples, "
              "decade-aware match labels and Tournament rank sorting."
          )
          PY

      - name: Preserve browser source
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/nfelo-search-improvements
          cp public/assets/app.js \
            /tmp/nfelo-search-improvements/app.js

      - name: Validate source syntax
        run: |
          set -euo pipefail
          python -m py_compile \
            scripts/build_site.py \
            tests/test_build.py
          node --check public/assets/app.js

      - name: Build complete site
        run: |
          set -euo pipefail
          python scripts/build_site.py \
            --source source \
            --config config \
            --output public

      - name: Run complete verification
        run: |
          set -euo pipefail
          python -m unittest discover \
            --start-directory tests \
            --verbose
          node --check public/assets/app.js
          if [ -f scripts/smoke_browser_boot.js ]; then
            node scripts/smoke_browser_boot.js public
          fi

      - name: Discard generated output and keep source patch
        shell: bash
        run: |
          set -euo pipefail
          git restore --worktree -- public source
          git clean -fd -- public
          cp /tmp/nfelo-search-improvements/app.js \
            public/assets/app.js

      - name: Check final patch
        shell: bash
        run: |
          set -euo pipefail

          python -m py_compile \
            scripts/build_site.py \
            tests/test_build.py
          node --check public/assets/app.js
          git diff --check

          changed="$(git status --short | awk '{print $2}' | sort)"
          expected="$(
            printf '%s\n' \
              public/assets/app.js \
              scripts/build_site.py \
              tests/test_build.py \
            | sort
          )"
          if [ "$changed" != "$expected" ]; then
            echo "Unexpected changed files:"
            printf '%s\n' "$changed"
            exit 1
          fi

          grep -F \
            'value="rank_change">Rank change' \
            public/assets/app.js
          grep -F \
            'const populateMatchTeamOptions' \
            public/assets/app.js
          grep -F \
            'MANUAL_TEAM_ALIAS_GROUPS' \
            scripts/build_site.py
          grep -F \
            'test_alias_search_dynamic_suggestions_and_rank_sort' \
            tests/test_build.py

      - name: Commit and push
        id: commit
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "The search improvements are already installed."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            public/assets/app.js \
            scripts/build_site.py \
            tests/test_build.py

          git commit -m \
            "Improve team aliases and dynamic search suggestions"
          git pull --rebase origin main
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Confirm deployment trigger
        if: steps.commit.outputs.changed == 'true'
        run: |
          echo "The push to main triggers the restored Pages workflow."
