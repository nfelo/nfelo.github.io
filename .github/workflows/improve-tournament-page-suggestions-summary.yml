name: Improve Tournament page suggestions and summary

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: improve-tournament-page-suggestions-summary
  cancel-in-progress: false

jobs:
  update:
    name: Improve Tournament page
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install reproducible runtime
        run: python -m pip install --requirement requirements.txt

      - name: Patch Tournament page
        shell: bash
        run: |
          set -euo pipefail

          python <<'PY'
          from pathlib import Path
          import re


          path = Path("public/assets/app.js")
          javascript = path.read_text(encoding="utf-8")


          def replace_once(
              text: str,
              old: str,
              new: str,
              description: str,
          ) -> str:
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(
                      f"Expected exactly one {description}; found {count}"
                  )
              return text.replace(old, new, 1)


          # Preserve the exact one-line forms required by the existing
          # Records regression tests. The previous Records edit wrapped
          # these statements without changing browser behaviour.
          restored_from = (
              'document.getElementById("number-one-from-calendar").max'
          )
          restored_to = (
              'document.getElementById("number-one-to-calendar").min'
          )
          if not (
              restored_from in javascript
              and restored_to in javascript
          ):
              calendar_pattern = re.compile(
                  r'(?P<indent>^[ \t]*)'
                  r'document\.getElementById\(\s*'
                  r'"number-one-from-calendar"\s*,?\s*'
                  r'\)\.max\s*=\s*to\s*\|\|\s*'
                  r'summary\.meta\.results_through;'
                  r'[ \t]*\n'
                  r'(?P=indent)'
                  r'document\.getElementById\(\s*'
                  r'"number-one-to-calendar"\s*,?\s*'
                  r'\)\.min\s*=\s*from\s*\|\|\s*'
                  r'"1872-01-01";',
                  flags=re.MULTILINE,
              )

              def restore_calendar_bounds(
                  match: re.Match[str],
              ) -> str:
                  indent = match.group("indent")
                  return (
                      f'{indent}document.getElementById('
                      '"number-one-from-calendar").max = '
                      'to || summary.meta.results_through;\n'
                      f'{indent}document.getElementById('
                      '"number-one-to-calendar").min = '
                      'from || "1872-01-01";'
                  )

              javascript, replacements = calendar_pattern.subn(
                  restore_calendar_bounds,
                  javascript,
                  count=1,
              )
              if replacements != 1:
                  raise RuntimeError(
                      "Could not restore the Records calendar-bound "
                      "statements."
                  )


          old_search = (
              '<input id="tournament-search" type="search" '
              'placeholder="Brazil, Thailand, Morocco…" '
              'value="${escapeHTML(route.query.get("q") || "")}">'
          )
          new_search = (
              '<input id="tournament-search" type="search" '
              'placeholder="Search tournament teams…" '
              'value="${escapeHTML(route.query.get("q") || "")}">'
          )
          if old_search in javascript:
              javascript = replace_once(
                  javascript,
                  old_search,
                  new_search,
                  "static Tournament team placeholder",
              )
          elif new_search not in javascript:
              raise RuntimeError(
                  "Could not find the Tournament team search field."
              )


          placeholder_marker = (
              "const updateTournamentSearchPlaceholder = "
              "(participants) => {"
          )
          if placeholder_marker not in javascript:
              edition_anchor = '''    const loadSelection = async () => {
          '''
              placeholder_function = r'''    const updateTournamentSearchPlaceholder = (participants) => {
                const names = [
                  ...new Set(
                    participants
                      .map(
                        (participant) => (
                          participant.nation
                          || summaryNames.get(participant.code)
                          || participant.code
                        ),
                      )
                      .filter(Boolean),
                  ),
                ];

                for (
                  let index = names.length - 1;
                  index > 0;
                  index -= 1
                ) {
                  const swapIndex = Math.floor(
                    Math.random() * (index + 1),
                  );
                  [names[index], names[swapIndex]] = [
                    names[swapIndex],
                    names[index],
                  ];
                }

                const examples = names.slice(
                  0,
                  Math.min(3, names.length),
                );
                const suffix = examples.length < names.length
                  ? "…"
                  : "";

                document.getElementById(
                  "tournament-search",
                ).placeholder = examples.length
                  ? `${examples.join(", ")}${suffix}`
                  : "Search tournament teams…";
              };

          '''
              javascript = replace_once(
                  javascript,
                  edition_anchor,
                  placeholder_function + edition_anchor,
                  "Tournament search-placeholder insertion point",
              )


          placeholder_call = (
              "updateTournamentSearchPlaceholder(participants);"
          )
          if placeholder_call not in javascript:
              participants_anchor = '''      const participants = editionParticipants();
              teams = participants.map((participant) => {
          '''
              participants_replacement = '''      const participants = editionParticipants();
              updateTournamentSearchPlaceholder(participants);
              teams = participants.map((participant) => {
          '''
              javascript = replace_once(
                  javascript,
                  participants_anchor,
                  participants_replacement,
                  "Tournament participant loading block",
              )


          summary_marker = "// Tournament edition summary"
          if summary_marker not in javascript:
              old_summary = '''      const rankedCount = teams.filter(
                (team) => team.rating != null,
              ).length;
              document.getElementById("tournament-count").textContent =
                number(teams.length);
              document.getElementById("tournament-label").textContent =
                `${selectedFamily.name} · ${selectedEdition.label}`;
              document.getElementById("tournament-description").textContent =
                selectedView === "after"
                  ? `All ${number(teams.length)} participants are shown, including teams without a published rating. ${number(rankedCount)} had a published rating after the tournament. Rank change compares each team's place in the full world ranking. Rating change includes only matches from this edition, excluding recalibration and unrelated results.`
                  : `All ${number(teams.length)} participants are shown, including teams without a published rating. ${number(rankedCount)} had a published rating before the tournament.`;
          '''
              new_summary = '''      // Tournament edition summary
              const rankedCount = teams.filter(
                (team) => team.rating != null,
              ).length;
              const unratedCount = teams.length - rankedCount;
              const coverageNote = unratedCount > 0
                ? ` All ${number(teams.length)} participants are shown, including teams without a published rating; ${number(unratedCount)} were unrated ${selectedView === "after" ? "after" : "before"} the tournament.`
                : "";

              document.getElementById("tournament-count").textContent =
                number(teams.length);
              document.getElementById("tournament-label").textContent =
                `${selectedFamily.name} · ${selectedEdition.label}`;
              document.getElementById("tournament-description").textContent =
                selectedView === "after"
                  ? `The tournament ended on ${validDate(selectedEdition.end)}. Rank change compares each team's place in the full world ranking. Rating change includes only matches from this edition, excluding recalibration and unrelated results.${coverageNote}`
                  : `The tournament ended on ${validDate(selectedEdition.end)}. This snapshot shows each participant immediately before the tournament.${coverageNote}`;
          '''
              javascript = replace_once(
                  javascript,
                  old_summary,
                  new_summary,
                  "Tournament edition summary block",
              )


          required = [
              restored_from,
              restored_to,
              'placeholder="Search tournament teams…"',
              placeholder_marker,
              "Math.random() * (index + 1)",
              "Math.min(3, names.length)",
              "examples.length < names.length",
              placeholder_call,
              summary_marker,
              "const unratedCount = teams.length - rankedCount;",
              "const coverageNote = unratedCount > 0",
              "including teams without a published rating",
              (
                  "The tournament ended on "
                  "${validDate(selectedEdition.end)}"
              ),
              (
                  "Rank change compares each team's place in the "
                  "full world ranking."
              ),
              (
                  "excluding recalibration and unrelated results."
              ),
          ]
          missing = [
              marker
              for marker in required
              if marker not in javascript
          ]
          if missing:
              raise RuntimeError(
                  "Tournament page validation failed; missing: "
                  + ", ".join(missing)
              )

          if 'placeholder="Brazil, Thailand, Morocco…"' in javascript:
              raise RuntimeError(
                  "The old cross-tournament team placeholder remains."
              )

          path.write_text(
              javascript.rstrip() + "\n",
              encoding="utf-8",
          )

          print(
              "Installed tournament-specific random suggestions, "
              "conditional rating coverage, and the tournament end date."
          )
          PY

      - name: Validate source syntax
        run: |
          set -euo pipefail
          python -m py_compile scripts/build_site.py tests/test_build.py
          node --check public/assets/app.js

      - name: Build static site
        run: |
          set -euo pipefail
          python scripts/build_site.py \
            --source source \
            --config config \
            --output public

      - name: Audit generated Tournament page
        shell: bash
        run: |
          set -euo pipefail

          python <<'PY'
          from pathlib import Path


          javascript = Path(
              "public/assets/app.js"
          ).read_text(encoding="utf-8")

          required = [
              'placeholder="Search tournament teams…"',
              (
                  "const updateTournamentSearchPlaceholder = "
                  "(participants) => {"
              ),
              "Math.random() * (index + 1)",
              "Math.min(3, names.length)",
              "examples.length < names.length",
              "updateTournamentSearchPlaceholder(participants);",
              "const unratedCount = teams.length - rankedCount;",
              "const coverageNote = unratedCount > 0",
              (
                  "The tournament ended on "
                  "${validDate(selectedEdition.end)}"
              ),
              (
                  "This snapshot shows each participant immediately "
                  "before the tournament."
              ),
              (
                  "Rank change compares each team's place in the "
                  "full world ranking."
              ),
          ]
          missing = [
              marker
              for marker in required
              if marker not in javascript
          ]
          assert not missing, missing

          assert (
              'placeholder="Brazil, Thailand, Morocco…"'
              not in javascript
          )

          # The implementation uses min(3, team count), so two-team
          # editions display two suggestions and larger editions display
          # no more than three.
          def example_count(team_count: int) -> int:
              return min(3, team_count)

          assert example_count(2) == 2
          assert example_count(3) == 3
          assert example_count(8) == 3

          # The coverage sentence is guarded, so it is absent whenever
          # every participant has a published rating.
          assert "unratedCount > 0" in javascript
          assert ': ""' in javascript

          print(
              "Audited tournament-specific suggestions, two-team "
              "handling, conditional coverage, and end-date text."
          )
          PY

      - name: Run complete verification
        run: |
          set -euo pipefail
          python -m unittest discover \
            --start-directory tests \
            --verbose
          node --check public/assets/app.js

      - name: Preserve source asset only
        shell: bash
        run: |
          set -euo pipefail

          cp public/assets/app.js /tmp/nfelo-tournament-app.js
          git restore --worktree -- public
          git clean -fd -- public
          cp /tmp/nfelo-tournament-app.js public/assets/app.js

      - name: Check final patch
        shell: bash
        run: |
          set -euo pipefail

          node --check public/assets/app.js
          git diff --check

          changed="$(git diff --name-only)"
          if [ "$changed" != "public/assets/app.js" ]; then
            echo "Unexpected changed files:"
            printf '%s\n' "$changed"
            exit 1
          fi

          grep -F \
            'Math.min(3, names.length)' \
            public/assets/app.js
          grep -F \
            'const coverageNote = unratedCount > 0' \
            public/assets/app.js
          grep -F \
            'The tournament ended on ${validDate(selectedEdition.end)}' \
            public/assets/app.js

      - name: Commit and push
        id: commit
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- public/assets/app.js; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "The Tournament page improvements are already installed."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add public/assets/app.js
          git commit -m "Improve Tournament page suggestions and summary"
          git pull --rebase origin main
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Confirm automatic Pages trigger
        if: steps.commit.outputs.changed == 'true'
        run: |
          echo "The push to main automatically triggers pages.yml."
          echo "No duplicate workflow_dispatch is sent."
