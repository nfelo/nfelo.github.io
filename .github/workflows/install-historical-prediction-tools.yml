name: Install historical prediction tools

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: install-site-features
  cancel-in-progress: true

jobs:
  install:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      UPDATE_ARCHIVE: >-
        
      UPDATE_SHA256: 4d343f0a4b285fac6823c6bf7215708f0d8c75e96e322756af17b84e09800c7f

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install reproducible runtime
        run: python -m pip install --requirement requirements.txt

      - name: Verify and apply the predictor files
        run: |
          printf '%s' "$UPDATE_ARCHIVE" | tr -d '[:space:]' | base64 --decode > /tmp/nfelo-historical-predictor.tar.xz
          echo "$UPDATE_SHA256  /tmp/nfelo-historical-predictor.tar.xz" | sha256sum --check
          tar -xJf /tmp/nfelo-historical-predictor.tar.xz -C .
          python -m py_compile scripts/forecast_layer.py scripts/model.py scripts/build_site.py tests/test_build.py
          node --check public/assets/app.js

      - name: Rebuild and test the complete site
        run: |
          python scripts/build_site.py --source source --config config --output public
          python -m unittest discover --start-directory tests --verbose
          node --check public/assets/app.js

      - name: Commit and publish the prediction tools
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- scripts/forecast_layer.py scripts/model.py scripts/build_site.py public/assets/app.js public/assets/styles.css tests/test_build.py
          if git diff --cached --quiet; then
            echo "The historical prediction tools are already installed."
          else
            git commit -m "feat(predict): add historical scores and rating effects"
            git push
          fi
