    steps:
      - name: Check out main
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify repository and starting revision
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_REPOSITORY" = "nfelo/nfelo.github.io"
          test "$GITHUB_REF_NAME" = "main"
          git fetch origin main
          test "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)"
          echo "$GITHUB_SHA" > "$RUNNER_TEMP/install-start-sha"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deployed runtime
        run: python -m pip install --requirement requirements.txt

      - name: Build the current reverted release as the comparison baseline
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_site.py --source source --config config --output public
          install -m 600 public/data/summary.json "$RUNNER_TEMP/nfelo-baseline-summary.json"

      - name: Decode and validate the audited release
        shell: bash
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/nfelo-audit-corrected-release.tar.xz"
          printf '%s%s%s' "$UPDATE_ARCHIVE_1" "$UPDATE_ARCHIVE_2" "$UPDATE_ARCHIVE_3" |
            tr -d '[:space:]' |
            base64 --decode > "$archive"
          printf '%s  %s\n' "$RELEASE_SHA256" "$archive" | sha256sum --check --strict

          python - "$archive" <<'PY'
          from pathlib import Path, PurePosixPath
          import sys
          import tarfile

          expected = {
              "README.md",
              "docs/model-validation.md",
              "docs/methodology-audit-2026-07-19.md",
              "scripts/model.py",
              "scripts/forecast_layer.py",
              "scripts/build_site.py",
              "public/assets/app.js",
              "public/assets/styles.css",
              "tests/test_build.py",
              "research/methodology-audit-2026-07-19/KEY_RESULTS.json",
              "research/methodology-audit-2026-07-19/README.md",
              "research/methodology-audit-2026-07-19/requirements.txt",
              "research/methodology-audit-2026-07-19/capture_batch_score.py",
              "research/methodology-audit-2026-07-19/capture_deployed.py",
              "research/methodology-audit-2026-07-19/compare_network_selections.py",
              "research/methodology-audit-2026-07-19/evaluate_dixon_coles.py",
              "research/methodology-audit-2026-07-19/evaluate_forecasts.py",
              "research/methodology-audit-2026-07-19/evaluate_gate.py",
              "research/methodology-audit-2026-07-19/evaluate_rankings.py",
              "research/methodology-audit-2026-07-19/network_eval.cpp",
              "research/methodology-audit-2026-07-19/prepare_matches.py",
              "research/methodology-audit-2026-07-19/reorder_matches.py",
              "research/methodology-audit-2026-07-19/search_causal_observation.py",
              "research/methodology-audit-2026-07-19/search_network.py",
              "research/methodology-audit-2026-07-19/search_simultaneous.py",
          }
          archive = Path(sys.argv[1])
          with tarfile.open(archive, "r:xz") as handle:
              members = handle.getmembers()
              names = {member.name for member in members}
              missing = sorted(expected - names)
              extra = sorted(names - expected)
              unsafe = [
                  member.name
                  for member in members
                  if (
                      not member.isfile()
                      or PurePosixPath(member.name).is_absolute()
                      or ".." in PurePosixPath(member.name).parts
                  )
              ]
              if missing or extra or unsafe:
                  raise SystemExit(
                      f"Unexpected release archive: missing={missing}, "
                      f"extra={extra}, unsafe={unsafe}"
                  )
          print(f"Validated {len(expected)} exact release files.")
          PY

          tar -xJf "$archive"

      - name: Install and verify the research runtime
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --requirement             research/methodology-audit-2026-07-19/requirements.txt
          python -m py_compile             scripts/model.py             scripts/forecast_layer.py             scripts/build_site.py             tests/test_build.py             research/methodology-audit-2026-07-19/*.py
          node --check public/assets/app.js
          python -m json.tool             research/methodology-audit-2026-07-19/KEY_RESULTS.json > /dev/null
          g++ -std=c++17 -O2 -Wall -Wextra -pedantic             research/methodology-audit-2026-07-19/network_eval.cpp             -o "$RUNNER_TEMP/nfelo-network-eval-check"
          if rg -n '[ \t]+$'             README.md             docs/model-validation.md             docs/methodology-audit-2026-07-19.md             scripts/model.py             scripts/forecast_layer.py             scripts/build_site.py             public/assets/app.js             public/assets/styles.css             tests/test_build.py             research/methodology-audit-2026-07-19; then
            echo "Release files contain trailing whitespace." >&2
            exit 1
          fi

      - name: Build the corrected release
        run: python scripts/build_site.py --source source --config config --output public

      - name: Run the complete site and model test suite
        shell: bash
        run: |
          set -euo pipefail
          python -m unittest discover --start-directory tests --verbose
          node --check public/assets/app.js

      - name: Enforce ranking, forecast and historical safety gates
        shell: bash
        run: |
          set -euo pipefail
          python - "$RUNNER_TEMP/nfelo-baseline-summary.json" public/data/summary.json <<'PY'
          import json
          from pathlib import Path
          import statistics
          import sys

          baseline = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          corrected = json.loads(Path(sys.argv[2]).read_text(encoding="utf-8"))

          if baseline["meta"]["source_sha256"] != corrected["meta"]["source_sha256"]:
              raise SystemExit("Baseline and candidate were not built from the same ledger")
          if baseline["meta"]["matches"] != corrected["meta"]["matches"]:
              raise SystemExit("The candidate changed the match ledger")

          old_current = {row["code"]: row for row in baseline["current"]}
          new_current = {row["code"]: row for row in corrected["current"]}
          if set(old_current) != set(new_current):
              raise SystemExit("Current-team eligibility changed unexpectedly")

          old_order = [row["code"] for row in baseline["current"]]
          new_order = [row["code"] for row in corrected["current"]]
          if old_order != new_order:
              changed = [
                  (code, old_order.index(code) + 1, new_order.index(code) + 1)
                  for code in old_order
                  if old_order.index(code) != new_order.index(code)
              ]
              raise SystemExit(f"Current ranking order changed: {changed[:20]}")

          current_deltas = [
              abs(new_current[code]["rating"] - old_current[code]["rating"])
              for code in old_current
          ]
          if max(current_deltas) >= 1.25 or statistics.fmean(current_deltas) >= 0.10:
              raise SystemExit(
                  "Current rating movement exceeded the audited release envelope: "
                  f"max={max(current_deltas):.6f}, "
                  f"mean={statistics.fmean(current_deltas):.6f}"
              )

          old_peaks = {row["code"]: row for row in baseline["peaks"]}
          new_peaks = {row["code"]: row for row in corrected["peaks"]}
          if set(old_peaks) != set(new_peaks):
              raise SystemExit("Peak-team coverage changed unexpectedly")
          old_top20 = [row["code"] for row in baseline["peaks"][:20]]
          new_top20 = [row["code"] for row in corrected["peaks"][:20]]
          if old_top20 != new_top20:
              raise SystemExit(
                  f"Top-20 peak order changed: old={old_top20}, new={new_top20}"
              )

          peak_deltas = [
              abs(new_peaks[code]["rating"] - old_peaks[code]["rating"])
              for code in old_peaks
          ]
          if max(peak_deltas) >= 4.25 or statistics.fmean(peak_deltas) >= 0.60:
              raise SystemExit(
                  "Peak movement exceeded the audited release envelope: "
                  f"max={max(peak_deltas):.6f}, "
                  f"mean={statistics.fmean(peak_deltas):.6f}"
              )

          early_codes = {"EN", "SC", "WA", "EI"}
          early_british = [
              row for row in corrected["peaks"]
              if row["code"] in early_codes and row["date"] < "1914-07-28"
          ]
          if not early_british:
              raise SystemExit("Historical British guard did not inspect any peak")
          if max(row["rating"] for row in early_british) >= 2040:
              raise SystemExit(f"Early British peak is implausibly high: {early_british}")
          if corrected["peaks"][0] in early_british:
              raise SystemExit("A pre-WWI British team became the all-time peak")
          if sum(row in early_british for row in corrected["peaks"][:20]) > 1:
              raise SystemExit(
                  "More than one pre-WWI British team entered the top 20 peaks"
              )
          if corrected["peaks"][0]["rating"] >= 2100:
              raise SystemExit("The public peak scale moved outside its established range")
          if "record_peaks" in corrected:
              raise SystemExit("A second incompatible public record ranking reappeared")
          if any("record_rating" in row for row in corrected["teams"]):
              raise SystemExit("A second incompatible public team rating reappeared")

          meta = corrected["meta"]
          if meta["methodology_version"] != "2026-07-19-audit-corrected-date-batch":
              raise SystemExit(f"Wrong methodology version: {meta['methodology_version']}")
          validation = corrected["validation"]
          if validation["primary_evidence"] != "nested_historical_holdout":
              raise SystemExit("Primary validation evidence is mislabelled")
          replay = validation["retrospective"]
          if replay["matches"] != 46801:
              raise SystemExit(f"Unexpected fixed validation count: {replay['matches']}")
          if not (0.8803 < replay["log_loss"] < 0.8811):
              raise SystemExit(f"Retrospective log loss is outside range: {replay['log_loss']}")
          if replay["log_loss"] >= replay["network_only_log_loss"]:
              raise SystemExit("The probability layer no longer improves retrospective log loss")
          if replay["unknown_dates"] != "sequential":
              raise SystemExit("Incomplete dates are not kept sequential")

          print(json.dumps({
              "results_through": meta["results_through"],
              "matches": meta["matches"],
              "current_rank_changes": 0,
              "current_max_abs_delta": max(current_deltas),
              "current_mean_abs_delta": statistics.fmean(current_deltas),
              "top20_peak_order_changes": 0,
              "peak_max_abs_delta": max(peak_deltas),
              "peak_mean_abs_delta": statistics.fmean(peak_deltas),
              "pre_wwi_british_in_top20": sum(
                  row in early_british for row in corrected["peaks"][:20]
              ),
              "retrospective_log_loss": replay["log_loss"],
          }, indent=2))
          PY

      - name: Replay reversed matchdays to prove date-order invariance
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          import sys
          import numpy as np

          sys.path.insert(0, "scripts")
          from model import NetworkEloReplay

          expected_state = json.loads(
              Path("public/data/state.json").read_text(encoding="utf-8")
          )
          expected_summary = json.loads(
              Path("public/data/summary.json").read_text(encoding="utf-8")
          )
          replay = NetworkEloReplay(Path("source"), Path("config"))
          original = replay.matches
          reordered = []
          start = 0
          reversed_rows = 0
          while start < len(original):
              first = original[start]
              end = start + 1
              if first.month > 0 and first.day_of_month > 0:
                  while (
                      end < len(original)
                      and original[end].day == first.day
                      and original[end].month > 0
                      and original[end].day_of_month > 0
                  ):
                      end += 1
              group = original[start:end]
              if len(group) > 1:
                  reordered.extend(reversed(group))
                  reversed_rows += len(group)
              else:
                  reordered.extend(group)
              start = end

          replay.matches = reordered
          actual = replay.replay()
          if actual.state["codes"] != expected_state["codes"]:
              raise SystemExit("Team order changed in reversed replay")

          def max_delta(left, right):
              return float(np.max(np.abs(
                  np.asarray(left, dtype=float) - np.asarray(right, dtype=float)
              )))

          metrics = {
              "complete_date_rows_reversed": reversed_rows,
              "max_mean_delta": max_delta(
                  actual.state["means"], expected_state["means"]
              ),
              "max_covariance_delta": max_delta(
                  actual.state["covariance"], expected_state["covariance"]
              ),
              "max_attack_delta": max_delta(
                  actual.state["forecast_layer"]["attack"],
                  expected_state["forecast_layer"]["attack"],
              ),
              "max_defence_delta": max_delta(
                  actual.state["forecast_layer"]["defence"],
                  expected_state["forecast_layer"]["defence"],
              ),
          }
          expected_ratings = {
              row["code"]: row["rating"] for row in expected_summary["teams"]
          }
          actual_ratings = {
              row["code"]: row["rating"] for row in actual.summary["teams"]
          }
          metrics["max_public_rating_delta"] = max(
              abs(expected_ratings[code] - actual_ratings[code])
              for code in expected_ratings
          )
          metrics["current_rank_order_identical"] = (
              [row["code"] for row in expected_summary["current"]]
              == [row["code"] for row in actual.summary["current"]]
          )
          if not metrics["current_rank_order_identical"]:
              raise SystemExit("Reversing same-date rows changed the current ranking")
          if max(
              metrics["max_mean_delta"],
              metrics["max_attack_delta"],
              metrics["max_defence_delta"],
              metrics["max_public_rating_delta"],
          ) >= 1e-7:
              raise SystemExit(f"Date-order state drift exceeded tolerance: {metrics}")
          if metrics["max_covariance_delta"] >= 1e-6:
              raise SystemExit(f"Date-order covariance drift exceeded tolerance: {metrics}")
          expected_loss = expected_summary["validation"]["retrospective"]["log_loss"]
          actual_loss = actual.summary["validation"]["retrospective"]["log_loss"]
          if abs(expected_loss - actual_loss) >= 1e-7:
              raise SystemExit(
                  f"Date-order forecast score changed: {expected_loss} vs {actual_loss}"
              )
          print(json.dumps(metrics, indent=2))
          PY

      - name: Commit the exact verified release
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          start_sha="$(cat "$RUNNER_TEMP/install-start-sha")"
          remote_sha="$(git rev-parse origin/main)"
          if [ "$remote_sha" != "$start_sha" ]; then
            echo "main changed during verification; no release was committed." >&2
            echo "Run this installer again after the other workflow finishes." >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
