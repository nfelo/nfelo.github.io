name: Install world number one records

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: install-world-number-ones
  cancel-in-progress: true

jobs:
  install:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      UPDATE_ARCHIVE: >-
        
      UPDATE_SHA256: e5369aeeca139eb06c0740f654947cf30497404d73832b82c663098e86155287

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install reproducible runtime
        run: python -m pip install --requirement requirements.txt

      - name: Verify and apply replacement files
        run: |
          printf '%s' "$UPDATE_ARCHIVE" | tr -d '[:space:]' | base64 --decode > /tmp/nfelo-number-ones.tar.xz
          echo "$UPDATE_SHA256  /tmp/nfelo-number-ones.tar.xz" | sha256sum --check
          tar -xJf /tmp/nfelo-number-ones.tar.xz -C .
          python -m py_compile scripts/build_site.py tests/test_build.py
          node --check public/assets/app.js

      - name: Rebuild and test the complete site
        run: |
          python scripts/build_site.py --source source --config config --output public
          python -m unittest discover --start-directory tests --verbose
          node --check public/assets/app.js

      - name: Commit and publish source changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- scripts/build_site.py public/assets/app.js tests/test_build.py
          if git diff --cached --quiet; then
            echo "The world-number-one feature is already installed."
          else
            git commit -m "feat(records): add NFELO world number one chronology"
            git push
          fi
