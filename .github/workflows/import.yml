name: Import Network Football Elo

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write
  pages: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Check out placeholder repository
        uses: actions/checkout@v5

      - name: Download and verify prepared repository
        run: |
          curl --fail --location --retry 5 --retry-all-errors \
            https://network-football-elo-import-20260714.benyominnemoff.chatgpt.site/network-football-elo-github-import.zip \
            --output /tmp/network-football-elo.zip
          echo "6f8b3f6149058b6b8f72d1635e222c43ce01f5c1dfdab77483aa92bbed59b9d9  /tmp/network-football-elo.zip" \
            | sha256sum --check --strict
          mkdir -p /tmp/network-football-elo-import
          unzip -q /tmp/network-football-elo.zip -d /tmp/network-football-elo-import

      - name: Replace placeholder with prepared project
        run: |
          rsync -a --delete --exclude='.git/' --exclude='.github/workflows/' \
            /tmp/network-football-elo-import/network-football-elo/ ./

      - name: Commit and publish project
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "Initial Network Football Elo site"
          git push origin HEAD:main

      - name: Start the Pages build
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for attempt in {1..12}; do
            if gh api --method POST \
              "repos/${GITHUB_REPOSITORY}/actions/workflows/pages.yml/dispatches" \
              -f ref=main; then
              exit 0
            fi
            sleep 5
          done
          echo "The project was imported, but the Pages workflow could not be dispatched." >&2
          exit 1
