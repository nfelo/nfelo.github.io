name: Polish copy and fix friendly forecasts v6

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: polish-copy-independence-and-forecast-links-v6
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out current main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime
        run: python -m pip install --requirement requirements.txt

      - name: Protect workflows and prospective forecasts
        shell: bash
        run: |
          set -euo pipefail
          find .github/workflows -type f -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            > /tmp/workflows.sha256
          cp source/prospective_forecasts.jsonl \
            /tmp/prospective_forecasts.jsonl

      - name: Apply classification, copy and forecast corrections
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/polish-copy-and-forecasts.py <<'PY'
          #!/usr/bin/env python3
          from __future__ import annotations

          import base64
          import json
          from pathlib import Path
          import re

          ROOT = Path(".")
          OLD_VERSION = "2026-07-23-evidence-backed-friendly-0.75185"
          NEW_VERSION = "2026-07-23-evidence-backed-friendly-0.76064"


          def read(path: str) -> str:
              return (ROOT / path).read_text(encoding="utf-8")


          def write(path: str, value: str) -> None:
              (ROOT / path).write_text(
                  value,
                  encoding="utf-8",
                  newline="\n",
              )


          def replace_once(path: str, old: str, new: str) -> None:
              value = read(path)
              count = value.count(old)
              if count != 1:
                  raise RuntimeError(
                      f"{path}: expected one occurrence, found {count}: "
                      f"{old[:140]!r}"
                  )
              write(path, value.replace(old, new, 1))


          def replace_all(path: str, old: str, new: str) -> None:
              value = read(path)
              if old not in value:
                  raise RuntimeError(
                      f"{path}: expected text was not found: {old[:140]!r}"
                  )
              write(path, value.replace(old, new))


          def sub_once(path: str, pattern: str, replacement: str) -> None:
              value = read(path)
              updated, count = re.subn(
                  pattern,
                  replacement,
                  value,
                  count=1,
                  flags=re.DOTALL,
              )
              if count != 1:
                  raise RuntimeError(
                      f"{path}: regex matched {count} times: "
                      f"{pattern[:140]!r}"
                  )
              write(path, updated)


          # ---------------------------------------------------------------------------
          # Historical registry and future classification.
          # ---------------------------------------------------------------------------

          registry_path = ROOT / "config/tournament_classification.json"
          registry = json.loads(registry_path.read_text(encoding="utf-8"))

          evidence_rows = {
              "IND": {
                  "basis": (
                      "The source code groups commemorative Independence tournaments "
                      "listed in RSSSF's International Country Results – Friendly "
                      "Tournaments archive."
                  ),
                  "evidence_type": "secondary_friendly_archive",
                  "evidence": {
                      "source_url": "https://www.rsssf.org/intland-friend.html",
                      "source_label": (
                          "RSSSF International Country Results – Friendly Tournaments"
                      ),
                  },
              },
              "MRD": {
                  "basis": (
                      "The Merdeka Tournament is listed in the international "
                      "friendly-tournament archive, and the AFC categorises the modern "
                      "edition under International Friendlies."
                  ),
                  "evidence_type": "official_and_secondary_friendly_evidence",
                  "evidence": {
                      "source_url": (
                          "https://www.the-afc.com/en/more/"
                          "international_friendlies/news/"
                          "malaysia_edge_lebanon_to_win_merdeka_tournament.html"
                      ),
                      "source_label": (
                          "AFC International Friendlies – Merdeka Tournament"
                      ),
                  },
              },
          }

          for code, evidence in evidence_rows.items():
              entry = registry["tournaments"][code]
              entry.update(
                  {
                      "status": "friendly",
                      "operational_class": "friendly",
                      "confidence": "high",
                      **evidence,
                  }
              )

          registry["methodology_version"] = NEW_VERSION
          registry["fit"] = {
              "complete_ledger_matches": 52312,
              "scoring_period": {
                  "first_year": 1960,
                  "last_date": "2026-07-11",
              },
              "state_initialisation_uses_pre_1960_matches": True,
              "primary_joint_refit": {
                  "ratio": 0.76064,
                  "matches": 46801,
                  "friendly_matches": 17724,
                  "log_loss": 0.881383694951,
                  "brier": 0.518758489316,
                  "rps": 0.172597463088,
                  "accuracy": 0.591098480802,
                  "friendly_temperature": 0.890357703717,
                  "competitive_temperature": 1.06004260619,
              },
              "comparison_previous_deployed_ratio": {
                  "ratio": 0.75185,
                  "matches": 46801,
                  "log_loss": 0.881384414078,
                  "brier": 0.518762723619,
                  "rps": 0.172599228728,
                  "accuracy": 0.591162581996,
                  "friendly_temperature": 0.890335396628,
                  "competitive_temperature": 1.06003938124,
              },
          }
          registry_path.write_text(
              json.dumps(
                  registry,
                  indent=2,
                  sort_keys=True,
                  ensure_ascii=False,
              )
              + "\n",
              encoding="utf-8",
              newline="\n",
          )

          replace_once(
              "scripts/tournament_classification.py",
              '''    r"\\bcentenary\\b",
              r"\\bcentennial\\b",
          )
          ''',
              '''    r"\\bcentenary\\b",
              r"\\bcentennial\\b",
              r"\\bindependence (?:anniversary )?(?:tournament|cup|festival|celebration)\\b",
              r"\\bmerdeka (?:tournament|cup|games)\\b",
          )
          ''',
          )

          # ---------------------------------------------------------------------------
          # Model constants, published metadata and research artifacts.
          # ---------------------------------------------------------------------------

          model_path = "scripts/model.py"
          replace_all(model_path, OLD_VERSION, NEW_VERSION)
          replace_all(
              model_path,
              "FRIENDLY_INFORMATION_RATIO = 0.75185",
              "FRIENDLY_INFORMATION_RATIO = 0.76064",
          )
          replace_all(
              model_path,
              "FRIENDLY_TEMPERATURE = 0.890607603114",
              "FRIENDLY_TEMPERATURE = 0.890357703717",
          )
          replace_all(
              model_path,
              "COMPETITIVE_TEMPERATURE = 1.05583721825",
              "COMPETITIVE_TEMPERATURE = 1.060042606190",
          )

          (ROOT / "research/friendly-ratio-full-sample.json").write_bytes(
              base64.b64decode("")
          )
          (ROOT / "research/friendly-ratio-local-grid.csv").write_bytes(
              base64.b64decode("")
          )

          # ---------------------------------------------------------------------------
          # README: timeless description instead of release notes.
          # ---------------------------------------------------------------------------

          readme_path = "README.md"
          replace_all(readme_path, OLD_VERSION, NEW_VERSION)
          replace_all(readme_path, "0.75185", "0.76064")
          replace_all(readme_path, "0.890607603114", "0.890357703717")
