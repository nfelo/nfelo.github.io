          | Parameter | Value |
          | --- | ---: |
          | Friendly information ratio | 0.76064 |
          | Friendly network temperature | 0.890357703717 |
          | Competitive network temperature | 1.060042606190 |

          Network-only retrospective log loss was 0.881383694951. At the previously
