      - name: Audit classification coverage
        shell: bash
        run: |
          set -euo pipefail
          args=(
            --source source
            --config config
            --registry config/tournament_classification.json
            --output build/tournament-classification
            --fail-on-any-new
          )
          if [ -f config/tournament_evidence.json ]; then
            args+=(--evidence config/tournament_evidence.json)
          fi
          python scripts/tournament_classification.py "${args[@]}"

          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(
              Path(
                  "build/tournament-classification/"
                  "tournament_classification_audit.json"
              ).read_text(encoding="utf-8")
          )
          summary = payload["summary"]
          assert summary["matches"] >= 52312, summary
          assert (
              summary["model_match_counts"]["friendly"]
              >= 20688
          ), summary
          assert (
              summary["status_match_counts"]["uncertain"]
              <= 1714
          ), summary
          assert summary["new_codes"] == 0, summary

          rows = {
              row["code"]: row
              for row in payload["rows"]
          }
          for code in ("IND", "MRD"):
              assert rows[code]["status"] == "friendly", rows[code]
              assert (
                  rows[code]["operational_class"] == "friendly"
              ), rows[code]
          PY

      - name: Rebuild complete site
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_site.py \
            --source source \
            --config config \
            --output public

      - name: Verify model, site and public voice
        shell: bash
        run: |
          set -euo pipefail
          python -m unittest discover \
            --start-directory tests \
            --verbose
          node --check public/assets/app.js
          python scripts/audit_site_consistency.py \
            --public public

          python - <<'PY'
          from datetime import date
          import json
          from pathlib import Path

          root = Path(".")
          summary = json.loads(
              (root / "public/data/summary.json").read_text(
                  encoding="utf-8"
              )
          )
          registry = json.loads(
              (
                  root
                  / "config/tournament_classification.json"
              ).read_text(encoding="utf-8")
          )
          catalog = json.loads(
              (
                  root
                  / "public/data/tournaments/index.json"
              ).read_text(encoding="utf-8")
          )
          app = (
              root / "public/assets/app.js"
          ).read_text(encoding="utf-8")
          readme = (
              root / "README.md"
          ).read_text(encoding="utf-8")

          assert summary["meta"]["methodology_version"] == (
              "2026-07-23-evidence-backed-friendly-0.76064"
          )
          parameters = summary["parameters"]
          assert (
              parameters["network"][
                  "friendly_information_ratio_exact"
              ]
              == "0.76064"
          )
          assert parameters["forecast_temperature_exact"] == {
              "friendly": "0.890357703717",
              "competitive": "1.060042606190",
          }

          calibration = parameters["forecast_layer"]["calibration"]
          assert calibration["training_matches"] == 7922
          assert abs(
              calibration["draw_log_tilt"]
              - 0.15086673239040566
          ) < 0.00005
          assert abs(
              calibration["friendly_temperature"]
              - 0.9157483856636819
          ) < 0.00005
          assert abs(
              calibration["competitive_temperature"]
              - 1.0657158171573844
          ) < 0.00005
          assert abs(
              calibration["nfelo_weight"]
              - 0.5424705022649909
          ) < 0.00005

          replay = summary["validation"]["retrospective"]
          assert replay["matches"] == 46801
          assert abs(
              replay["log_loss"]
              - 0.8800651979728462
          ) < 0.00005
          assert abs(
              replay["network_only_log_loss"]
              - 0.8814272526733231
          ) < 0.00005

          for code in ("IND", "MRD"):
              entry = registry["tournaments"][code]
              assert entry["operational_class"] == "friendly"

          friendly_codes = {
              code
              for code, entry in registry["tournaments"].items()
              if entry["operational_class"] == "friendly"
          }
          catalog_codes = {
              code
              for family in catalog["families"]
              for code in family.get("source_codes", [])
          }
          assert not (friendly_codes & catalog_codes)

          family_ids = {
              family["id"]
              for family in catalog["families"]
          }
          assert all(
              row["tournament_id"] in family_ids
              for row in summary["best_tournaments"]
          )

          current = next(
              spell
              for spell in summary["number_ones"]
              if spell["to"] is None
          )
          as_of = max(
              date.today(),
              date.fromisoformat(
                  summary["meta"]["results_through"]
              ),
          )
          assert current["days"] == (
              as_of
              - date.fromisoformat(current["from"])
          ).days + 1

          assert app.count('question: "') == 29
          assert (
              "What do the Tournaments and Best tournaments "
              "pages show?"
          ) not in app
          assert "How is the methodology tested?" in app
          assert (
              "Why is a friendly’s rating change not always "
              "76.1% of a competitive match?"
          ) in app
          assert "probabilities = linkedMatch.p.map(Number)" in app
          assert "date: fixture.date" in app
          assert "maximumPredictionDate" in app
          normalized_app = " ".join(app.split())
          assert (
              "beforeDate ? event.date < dateValue "
              ": event.date <= dateValue"
          ) in normalized_app
          assert (
              "beforeDate ? item.date < dateValue "
              ": item.date <= dateValue"
          ) in normalized_app

          for phrase in (
              "Tournament class was subsequently separated",
              "The current attack/defence layer",
              "while the full grid now sums",
          ):
              assert phrase not in app
          for phrase in (
              "What the 19 July 2026 audit changed",
              "This release adopts",
              "From this release onward",
              "are now separate",
          ):
              assert phrase not in readme
          PY

      - name: Restore prospective ledger and protect workflows
        shell: bash
        run: |
          set -euo pipefail
          cp /tmp/prospective_forecasts.jsonl \
            source/prospective_forecasts.jsonl
          sha256sum --check /tmp/workflows.sha256
          git diff --quiet -- .github/workflows
          git diff --cached --quiet -- .github/workflows

      - name: Commit corrections
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add -- \
            README.md \
            config/tournament_classification.json \
            scripts/model.py \
            scripts/tournament_classification.py \
            public/assets/app.js \
            tests/test_build.py \
            tests/test_tournament_classification.py \
            docs/model-validation.md \
            docs/tournament-classification-method.md \
            research/friendly-ratio-full-sample.json \
            research/friendly-ratio-local-grid.csv

          if ! git diff --quiet -- .github/workflows \
            || ! git diff --cached --quiet -- .github/workflows; then
            echo "::error::A workflow file changed unexpectedly."
            git status --short -- .github/workflows
            exit 1
          fi

          git diff --cached --check
          if git diff --cached --quiet; then
            echo "No correction changes to commit."
            exit 0
          fi

          git commit -m \
            "Polish public copy and align friendly forecasts"
          git push origin HEAD:main
