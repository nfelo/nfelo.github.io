name: Audit Other tournaments and historical labels

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: audit-other-tournaments-and-historical-labels
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out current main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime
        run: python -m pip install --requirement requirements.txt

      - name: Protect workflows and prospective forecasts
        shell: bash
        run: |
          set -euo pipefail
          find .github/workflows -type f -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            > /tmp/workflows.sha256
          cp source/prospective_forecasts.jsonl \
            /tmp/prospective_forecasts.jsonl

      - name: Install audited classification and copy changes
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/patch-other-tournaments.py <<'PY'
          #!/usr/bin/env python3
          from __future__ import annotations

          import csv
          import json
          from pathlib import Path
          import re

          ROOT = Path('.')
          OLD_VERSION = '2026-07-23-evidence-backed-friendly-0.76064'
          NEW_VERSION = '2026-07-23-evidence-backed-friendly-0.78621'

          FRIENDLY_OTHER_CODES = {
              'ABC', 'ACV', 'ADC', 'AFD', 'AIM', 'ANF', 'ARR', 'AYA',
              'AZT', 'BIC', 'BLA', 'BLR', 'BLT', 'BQR', 'BRI', 'CBG',
              'CDM', 'CDS', 'CFS', 'CLG', 'CNT', 'CNY', 'CON', 'CRO',
              'CTS', 'CVP', 'DBT', 'DNS', 'DVC', 'EAC', 'ECO', 'EDT',
              'ETR', 'FFT', 'GBT', 'GLT', 'GRC', 'GRD', 'INC', 'INL',
              'IPC', 'KOR', 'MGC', 'MJT', 'MKR', 'MLM', 'N7C', 'NBT',
              'NKB', 'NRZ', 'NSM', 'NTC', 'OCH', 'OPS', 'OSN', 'PCC',
              'PMC', 'PMT', 'PRC', 'PRS', 'PST', 'RMA', 'RVC', 'SAT',
              'SBA', 'SLV', 'SMB', 'TRP', 'UCT', 'VFF', 'VIC', 'WUC',
          }

          COMPETITIVE_OTHER_CODES = {
              'ATL', 'BG', 'CMS', 'FPG', 'FRN', 'GNF', 'GSG', 'ILG',
              'JCM', 'LIT', 'NKR', 'RCD', 'TCC', 'TRE', 'VWC', 'WIT',
          }

          RSSSF_FRIENDLY_INDEX = 'https://www.rsssf.org/intland-friend.html'

          OFFICIAL_FRIENDLY_EVIDENCE = {
              'AIM': {
                  'source_url': (
                      'https://www.the-afc.com/en/national/fifa_world_cup/'
                      'news/oman_hold_nerves_to_clinch_2019_airmarine_cup.html'
                  ),
                  'source_label': 'AFC: Airmarine Cup friendly tournament',
              },
              'CFS': {
                  'source_url': (
                      'https://www.concacaf.com/news/'
                      'concacaf-anuncia-el-calendario-de-marzo-de-la-concacaf-series'
                  ),
                  'source_label': 'Concacaf: Concacaf Friendly Series',
              },
              'GRD': {
                  'source_url': (
                      'https://www.kemenpora.go.id/detail/6587/'
                      'garuda-championship-series-2026-jadi-ajang-pemanasan-'
                      'timnas-indonesia-jelang-piala-dunia'
                  ),
                  'source_label': (
                      'Indonesia Ministry: Garuda Championship Series '
                      'FIFA Matchday preparation'
                  ),
              },
              'NBT': {
                  'source_url': 'https://english.ahram.org.eg/News/3165.aspx',
                  'source_label': (
                      'Egyptian FA reporting: Nile Basin friendly tournament'
                  ),
              },
              'NRZ': {
                  'source_url': (
                      'https://www.the-afc.com/en/more/international_friendlies/'
                      'news/central_asian_trio_set_for_navruz_cup.html'
                  ),
                  'source_label': 'AFC: Navruz Cup friendly tournament',
              },
              'NSM': {
                  'source_url': 'https://www.jordanpulse.com/article/13199',
                  'source_label': (
                      'Jordan FA reporting: international friendly tournament'
                  ),
              },
          }

          OFFICIAL_COMPETITIVE_EVIDENCE = {
              'NKR': {
                  'source_url': 'https://www.rsssf.org/tablesn/nkrumah.html',
                  'source_label': (
                      'RSSSF: West African Soccer Federation championship'
                  ),
              },
              'FRN': {
                  'source_url': (
                      'https://www.fff.fr/competition/engagement/'
                      '383387-coupe-de-l-outre-mer/phase/1/index.html'
                  ),
                  'source_label': 'FFF: Coupe de l’Outre-Mer competition',
              },
          }


          def path(name: str) -> Path:
              return ROOT / name


          def read(name: str) -> str:
              return path(name).read_text(encoding='utf-8')


          def write(name: str, value: str) -> None:
              path(name).write_text(value, encoding='utf-8', newline='\n')


          def require(condition: bool, message: str) -> None:
              if not condition:
                  raise RuntimeError(message)


          def replace_exact(
              name: str,
              old: str,
              new: str,
              *,
              expected: int | None = None,
          ) -> None:
              value = read(name)
              found = value.count(old)
              if expected is not None and found != expected:
                  raise RuntimeError(
                      f'{name}: expected {expected} occurrences, found {found}: '
                      f'{old[:140]!r}'
                  )
              if found == 0:
                  raise RuntimeError(
                      f'{name}: required text not found: {old[:140]!r}'
                  )
              write(name, value.replace(old, new))


          def replace_optional(name: str, old: str, new: str) -> bool:
              value = read(name)
              if old not in value:
                  return False
              write(name, value.replace(old, new))
              return True


          def regex_replace(
              name: str,
              pattern: str,
              replacement: str,
              *,
              required: bool = True,
              flags: int = re.DOTALL,
          ) -> int:
              value = read(name)
              updated, count = re.subn(
                  pattern,
                  replacement,
                  value,
                  flags=flags,
              )
              if required and count == 0:
                  raise RuntimeError(
                      f'{name}: regex did not match: {pattern[:140]!r}'
                  )
              if count:
                  write(name, updated)
              return count


          def replace_heading_section(
              name: str,
              heading_pattern: str,
              next_heading_pattern: str,
              replacement: str,
          ) -> None:
              pattern = (
                  rf'(?ms)^{heading_pattern}\n.*?'
                  rf'(?=^{next_heading_pattern}\n)'
              )
              count = regex_replace(
                  name,
                  pattern,
                  replacement.rstrip() + '\n\n',
              )
              if count != 1:
                  raise RuntimeError(
                      f'{name}: heading section matched {count} times.'
                  )


          def remove_js_statement(lines: list[str], marker: str) -> list[str]:
              matches = [i for i, line in enumerate(lines) if marker in line]
              if not matches:
                  return lines
              if len(matches) != 1:
                  raise RuntimeError(
                      f'app.js: expected one {marker!r}, found {len(matches)}.'
                  )
              start = matches[0]
              for end in range(start, len(lines)):
                  if lines[end].strip() in {');', '});'}:
                      return lines[:start] + lines[end + 1:]
              raise RuntimeError(f'app.js: could not find end of {marker!r}.')


          # ---------------------------------------------------------------------------
          # Registry: audit all 88 source codes feeding Other tournaments.
          # ---------------------------------------------------------------------------

          registry_path = path('config/tournament_classification.json')
          registry = json.loads(registry_path.read_text(encoding='utf-8'))
          tournaments = registry['tournaments']
          all_audited = FRIENDLY_OTHER_CODES | COMPETITIVE_OTHER_CODES

          require(len(FRIENDLY_OTHER_CODES) == 72, 'Friendly audit set is not 72 codes.')
          require(
              len(COMPETITIVE_OTHER_CODES) == 16,
              'Competitive audit set is not 16 codes.',
          )
          require(
              not (FRIENDLY_OTHER_CODES & COMPETITIVE_OTHER_CODES),
              'Friendly and competitive audit sets overlap.',
          )
          missing = all_audited - tournaments.keys()
          require(not missing, f'Audited codes missing from registry: {sorted(missing)}')

          for code in sorted(FRIENDLY_OTHER_CODES):
              entry = tournaments[code]
              evidence = OFFICIAL_FRIENDLY_EVIDENCE.get(
                  code,
