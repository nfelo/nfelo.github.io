          been reviewed code by code: 72 source codes are friendly invitationals or
          preparation events, while 16 are formal competitions.

          The full 52,312-match replay scored 46,801 forecasts from 1960 through
          11 July 2026. Joint fitting selected:

          | Parameter | Value |
          | --- | ---: |
          | Friendly information ratio | 0.78621 |
          | Friendly network temperature | 0.896294991479 |
          | Competitive network temperature | 1.061356232973 |

          Network-only retrospective log loss is 0.881475145850. At the previous ratio
          of 0.76064, with temperatures refitted under the same classification, it is
          0.881478166958.

          This is a full-sample retrospective fit. It is reproducible to the fixed ledger
          and objective, but it is not a new nested out-of-period result. The original
          nested historical holdout remains the primary comparison against other rating
          systems.''',
          )

          for old, new in (
              ('## Independent methodology audit',
               '## Method selection and structural checks'),
              ('The 19 July 2026 audit reconstructed the deployed chronology and ran',
               'The structural review reconstructed the chronology and ran'),
              ('The audit did not support Dixon–Coles',
               'The evidence did not support Dixon–Coles'),
              ('Audit change from the deployed network', 'Ablation'),
              ("Under the audit's strict-date implementation",
               'Under the strict-date implementation'),
              ('The audit found that latent posterior-mean gaps',
               'Latent posterior-mean gaps'),
          ):
              replace_optional(validation_path, old, new)


          # ---------------------------------------------------------------------------
          # Research grid. Values are the completed local fit from the audit.
          # ---------------------------------------------------------------------------

          grid_rows = [
              ('joint_refit', 0.70000, 0.881519430412, 0.896169370136, 1.061329410070),
              ('joint_refit', 0.72000, 0.881500079686, 0.896243038989, 1.061388463650),
              ('joint_refit', 0.74000, 0.881486154123, 0.896287505304, 1.061417061750),
              ('joint_refit', 0.76000, 0.881478312020, 0.896310353863, 1.061411063890),
              ('joint_refit', 0.76064, 0.8814781669580547, 0.8963104790698693, 1.0614100830809954),
              ('joint_refit', 0.78000, 0.881475350115, 0.896304264501, 1.061373492330),
              ('joint_refit', 0.78585, 0.881475146579, 0.896295567720, 1.061357437390),
              ('joint_refit', 0.78607, 0.881475145963, 0.896295265427, 1.061356493570),
              ('joint_refit', 0.78608, 0.881475145948, 0.896295127102, 1.061356479430),
              ('joint_refit', 0.78609, 0.881475145934, 0.896295000218, 1.061356752350),
              ('joint_refit', 0.78610, 0.881475145921, 0.896295124308, 1.061356557850),
              ('joint_refit', 0.78611, 0.881475145909, 0.896295031179, 1.061356351510),
              ('joint_refit', 0.78612, 0.881475145898, 0.896295057817, 1.061356505050),
              ('joint_refit', 0.78613, 0.881475145888, 0.896295076967, 1.061356528010),
              ('joint_refit', 0.78614, 0.881475145880, 0.896295047802, 1.061356553470),
              ('joint_refit', 0.78615, 0.881475145872, 0.896295223882, 1.061356352540),
              ('joint_refit', 0.78616, 0.881475145866, 0.896294910357, 1.061356302410),
              ('joint_refit', 0.78617, 0.881475145860, 0.896295048927, 1.061356479430),
              ('joint_refit', 0.78621, 0.8814751458501191, 0.8962949914792213, 1.0613562329731670),
              ('joint_refit', 0.78622, 0.881475145850, 0.896294961130, 1.061356430960),
              ('joint_refit', 0.78631, 0.881475145902, 0.896294746449, 1.061355893560),
              ('joint_refit', 0.78944, 0.881475199934, 0.896289244665, 1.061346045990),
              ('joint_refit', 0.80000, 0.881476188320, 0.896265237307, 1.061306799470),
              ('joint_refit', 0.82000, 0.881481370883, 0.896202000216, 1.061213015240),
              ('joint_refit', 0.84000, 0.881490403142, 0.896117786953, 1.061100222310),
              ('joint_refit', 0.86000, 0.881503122319, 0.896014507597, 1.060974652530),
              ('joint_refit', 0.88000, 0.881519466594, 0.895892755997, 1.060839007570),
              ('joint_refit', 0.90000, 0.881538466838, 0.895754301618, 1.060701266670),
              ('joint_refit', 1.00000, 0.881656431549, 0.894824298538, 1.060060997980),
          ]
          with path('research/friendly-ratio-local-grid.csv').open(
              'w', encoding='utf-8', newline=''
          ) as handle:
              writer = csv.writer(handle, lineterminator='\n')
              writer.writerow([
                  'fit',
                  'ratio',
                  'log_loss',
                  'friendly_temperature',
                  'competitive_temperature',
              ])
              writer.writerows(grid_rows)


          # ---------------------------------------------------------------------------
          # Tests: update only affected values and add current-state regressions.
          # Do not replace complete test or application files with historical snapshots.
          # ---------------------------------------------------------------------------

          for test_name in (
              'tests/test_build.py',
              'tests/test_tournament_classification.py',
          ):
              value = read(test_name)
              for old, new in (
                  (OLD_VERSION, NEW_VERSION),
