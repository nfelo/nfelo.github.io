                      'source_url': RSSSF_FRIENDLY_INDEX,
                      'source_label': (
                          'RSSSF International Country Results – Friendly Tournaments'
                      ),
                  },
              )
              entry.update({
                  'status': 'friendly',
                  'operational_class': 'friendly',
                  'confidence': 'high',
                  'basis': (
                      'Audited invitational or friendly tournament without '
                      'qualification, championship, promotion or relegation '
                      'consequences.'
                  ),
                  'evidence_type': 'other_tournament_audit_friendly',
                  'evidence': evidence,
                  'official_structure': False,
              })

          for code in sorted(COMPETITIVE_OTHER_CODES):
              entry = tournaments[code]
              evidence = OFFICIAL_COMPETITIVE_EVIDENCE.get(
                  code,
                  entry.get('evidence') or {},
              )
              entry.update({
                  'status': 'competitive',
                  'operational_class': 'competitive',
                  'confidence': 'high',
                  'basis': (
                      'Audited formal regional, federation or multi-sport '
                      'competition with an official championship structure.'
                  ),
                  'evidence_type': 'other_tournament_audit_competitive',
                  'evidence': evidence,
                  'official_structure': True,
              })

          registry['methodology_version'] = NEW_VERSION
          registry['fit'] = {
              'complete_ledger_matches': 52312,
              'scoring_period': {
                  'first_year': 1960,
                  'last_date': '2026-07-11',
              },
              'state_initialisation_uses_pre_1960_matches': True,
              'primary_joint_refit': {
                  'ratio': 0.78621,
                  'matches': 46801,
                  'friendly_matches': 18546,
                  'log_loss': 0.8814751458501191,
                  'brier': 0.5188039782621054,
                  'rps': 0.17261426245485592,
                  'accuracy': 0.5909916454776607,
                  'friendly_temperature': 0.8962949914792213,
                  'competitive_temperature': 1.061356232973167,
              },
              'comparison_previous_deployed_ratio': {
                  'ratio': 0.76064,
                  'matches': 46801,
                  'log_loss': 0.8814781669580547,
                  'brier': 0.5188171887932028,
                  'rps': 0.17261990129958893,
                  'accuracy': 0.5909702784128544,
                  'friendly_temperature': 0.8963104790698693,
                  'competitive_temperature': 1.0614100830809954,
              },
          }
          registry_path.write_text(
              json.dumps(registry, indent=2, sort_keys=True, ensure_ascii=False) + '\n',
              encoding='utf-8',
              newline='\n',
          )


          # ---------------------------------------------------------------------------
          # Model constants.
          # ---------------------------------------------------------------------------

          model_path = 'scripts/model.py'
          for old, new in (
              (OLD_VERSION, NEW_VERSION),
              ('FRIENDLY_INFORMATION_RATIO = 0.76064',
               'FRIENDLY_INFORMATION_RATIO = 0.78621'),
              ('FRIENDLY_TEMPERATURE = 0.890357703717',
               'FRIENDLY_TEMPERATURE = 0.896294991479'),
              ('COMPETITIVE_TEMPERATURE = 1.060042606190',
               'COMPETITIVE_TEMPERATURE = 1.061356232973'),
          ):
              replace_exact(model_path, old, new, expected=1)


          # ---------------------------------------------------------------------------
          # Best tournaments: historical table names; joined lineage only in chooser.
          # ---------------------------------------------------------------------------

          app_path = 'public/assets/app.js'
          app = read(app_path)
          require('76.1%' in app, 'app.js: expected the current rounded value 76.1%.')
          app = app.replace('76.1%', '78.6%')
          lines = app.splitlines(keepends=True)
          lines = remove_js_statement(lines, 'const tournamentLabels = new Map(')
          lines = remove_js_statement(lines, 'bestTournamentRows.forEach((row) => {')
          app = ''.join(lines)
          old_cell = 'row.display_nation || row.nation, row.after'
          require(old_cell in app, 'app.js: joined Best tournaments table label not found.')
          app = app.replace(old_cell, 'row.nation, row.after')
          require(
              'label: currentFirstRecordLabel(code, names)' in app,
              'app.js: lineage-aware chooser label is missing.',
          )
          write(app_path, app)


          # ---------------------------------------------------------------------------
          # README: timeless current description and exact parameters.
          # ---------------------------------------------------------------------------

          readme_path = 'README.md'
          readme = read(readme_path)
          for old, new in (
              (OLD_VERSION, NEW_VERSION),
              ('0.76064', '0.78621'),
              ('0.890357703717', '0.896294991479'),
              ('1.060042606190', '1.061356232973'),
              ('76.1%', '78.6%'),
              ('20,688', '21,529'),
              ('17,724', '18,546'),
          ):
              readme = readme.replace(old, new)
          write(readme_path, readme)

          regex_replace(
              readme_path,
              r'(?ms)^Tournament snapshots use.*?\n\nThe rating state',
              '''Tournament snapshots use the same published rating immediately before and
          after each completed edition. Tournament rating change and Best tournaments
          include only published movement from that edition’s matchdays, excluding annual
          recalibration and unrelated results. Tables use the team name active during the
          edition; selectors use joined lineage labels so successor names remain easy to
          find.

          The rating state''',
          )

          replace_heading_section(
              readme_path,
              r'## Tournament classification and friendly(?:-| )information(?: study)?',
              r'## Validation: two different evidence classes',
              '''## Tournament classification and friendly information

          Tournament importance and match class are separate. The maintained registry
          contains 188 friendly codes covering 21,529 matches, 239 competitive codes
          covering 30,165 matches and 233 uncertain codes covering 618 matches. Uncertain
          and unknown competitions use the competitive information weight.

          Every family previously placed in the fallback Other tournaments category has
          been reviewed. Seventy-two source codes represent invitationals, preparation
          events or friendly series; sixteen represent formal regional, federation or
          multi-sport competitions. Friendly families are excluded from both Tournaments
          and Best tournaments.

          Under this classification, the full 52,312-match replay jointly fitted:

          - friendly information ratio `0.78621`;
          - friendly network temperature `0.896294991479`; and
          - competitive network temperature `1.061356232973`.

          The scoring period contains 46,801 forecasts from 1960 through 11 July 2026,
          including 18,546 friendlies. The network-only log-loss minimum is
          `0.881475145850`. At the previous ratio of `0.76064`, with both temperatures
          refitted under the same classification, it is `0.881478166958`.

          These are reproducible full-sample constants for the fixed ledger and
          objective, not claims of equivalent population precision. Classification
          evidence, future results and prospective scoring can move the preferred value.''',
          )

          # Remove any remaining release-note framing while preserving the underlying
          # methodology explanation.
          for old, new in (
              ('This release adopts', 'The model uses'),
              ('From this release onward,', ''),
              ('Tournament class was subsequently separated',
               'Tournament class is separate'),
              ('The current attack/defence layer', 'The attack/defence layer'),
              ('while the full grid now sums', 'while the full grid sums'),
          ):
              replace_optional(readme_path, old, new)


          # ---------------------------------------------------------------------------
          # Classification and model-validation documentation.
          # ---------------------------------------------------------------------------

          classification_doc = '''# Tournament classification

          Tournament importance and match class are separate. A source importance level
          does not by itself determine whether a match is friendly.

          ## Operational policy

          Each source code has one maintained status:

          - `friendly` — positive evidence identifies an exhibition, preparation event,
            invitational or friendly series;
          - `competitive` — regulations or historical structure identify qualification,
            championship, promotion, relegation or a formal federation competition;
          - `uncertain` — the available evidence is not decisive.

          Uncertain and unknown matches use the competitive information weight. Official
          competition consequences take precedence over friendly-looking words. Date and
          edition overrides are supported when one source code contains more than one
          type of event.

          ## Evidence order

          Classification uses the following order:

          1. date or edition override;
          2. explicit organiser evidence;
          3. official qualification, playoff, league, promotion or relegation
             consequences;
          4. recognised friendly exceptions and organiser descriptions;
          5. recognised formal championship or games structure;
          6. unambiguous exhibition, preparation, invitational, memorial, anniversary or
             friendly-series wording;
          7. maintained historical evidence;
          8. `uncertain`, operationally competitive.

          Secondary historical indexes can support exact historical entries, but they do
          not override official competition evidence.

          ## Other tournaments review

          The fallback Other tournaments category has been reviewed code by code.

          - 72 source codes are friendly invitationals, preparation tournaments or
            friendly series.
          - 16 source codes are formal regional, federation or multi-sport competitions.
          - Friendly codes are removed from Tournaments and Best tournaments.
          - The complete decisions and evidence references are stored in
            `research/other-tournaments-audit.json` and
            `research/other-tournaments-audit.csv`.

          The formal competitive group contains the Atlantic Cup, Bolivarian Games,
          COMESA Cup, Francophone Games, French Territory Cup, GANEFO Tournament,
          Gossage Cup, Islamic Games, French Commonwealth Games, Leeward Islands
          Tournament, Nkrumah Cup, RCD Pact Tournament, Trans-Caucasian Championship,
          Triangulaire, VIVA World Cup and Windward Islands Tournament.

          ## Full-sample fit

          With every evidence-backed friendly code classified as friendly and every
          uncertain code operationally competitive:

          - complete ledger: 52,312 matches;
          - friendly matches: 21,529;
          - competitive matches: 30,165;
          - uncertain matches: 618;
          - scored period: 46,801 matches from 1960 through 11 July 2026;
          - scored friendlies: 18,546;
          - friendly information ratio: **0.78621**;
          - friendly network temperature: **0.896294991479**;
          - competitive network temperature: **1.061356232973**;
          - network-only log loss: **0.881475145850**.

          The five-decimal optimum is numerically precise for this fixed historical
          sample and objective. It is not a five-decimal estimate of the true population
          parameter; classification evidence and future results can move it.

          ## New source codes

          Every rebuild applies the classifier to source metadata. A new code is
          classified automatically only when the evidence is decisive. Otherwise it is
          marked uncertain and receives the competitive information weight until the
          registry is reviewed.

          The standalone audit command produces JSON and CSV coverage reports:

          ```bash
          python scripts/tournament_classification.py \\
            --source source \\
            --config config \\
            --registry config/tournament_classification.json \\
            --output build/tournament-classification \\
            --fail-on-any-new
          ```
          '''
          write('docs/tournament-classification-method.md', classification_doc)

          validation_path = 'docs/model-validation.md'
          replace_heading_section(
              validation_path,
              r'### Tournament classification and friendly-information fit',
              r'### Core ablations',
              '''### Tournament classification and friendly-information fit

          The friendly/competitive decision is separate from the source importance
          level. A three-state registry classifies tournaments as friendly, competitive
          or uncertain. Only positive friendly evidence receives the reduced information
