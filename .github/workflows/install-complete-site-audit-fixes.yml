name: Install complete site audit fixes

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install runtime
        run: python -m pip install --requirement requirements.txt
      - name: Install and verify update
        env:
          UPDATE_ARCHIVE: 
        run: |
          printf '%s' "$UPDATE_ARCHIVE" | base64 --decode > /tmp/complete-site-audit-fixes.tar.xz
          tar -xJf /tmp/complete-site-audit-fixes.tar.xz
          python scripts/build_site.py
          python -m unittest discover --start-directory tests --verbose
          node --check public/assets/app.js
      - name: Commit update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/model.py scripts/build_site.py public/index.html public/assets/app.js public/assets/styles.css tests/test_build.py
          git commit -m "Fix site-wide navigation history and sharing"
          git push
