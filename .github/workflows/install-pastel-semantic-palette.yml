        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/nfelo-pastel-semantic-palette-assets.tar.xz"
          printf '%s' "$UPDATE_ARCHIVE" | tr -d '[:space:]' | base64 --decode > "$archive"
          echo "c4f5e368f75705e2915a2c24e70dc02f7748a2d50750a982d2267a58e35a9c9b  $archive" | sha256sum --check

          python - "$archive" <<'PY'
          import sys
          import tarfile
          from pathlib import PurePosixPath

          archive = sys.argv[1]
          expected = {
              "public/assets/styles.css",
              "public/favicon.svg",
              "public/social-card.png",
              "public/social-card.svg",
          }
          with tarfile.open(archive, "r:xz") as bundle:
              members = bundle.getmembers()
              names = {
                  str(PurePosixPath(member.name))
                  for member in members
              }
              if names != expected:
                  raise SystemExit(
                      f"Unexpected archive contents: expected={sorted(expected)!r}, actual={sorted(names)!r}"
                  )
              if any(not member.isfile() for member in members):
                  raise SystemExit("The release archive may contain regular files only.")
              bundle.extractall(path=".", filter="data")
          PY

          python - <<'PY'
          from pathlib import Path

          app_path = Path("public/assets/app.js")
          app = app_path.read_text(encoding="utf-8")
          replacements = (
              ('stop-color="#ef725f"', 'stop-color="var(--coral)"'),
              ('fill="#ef725f"', 'fill="var(--coral)"'),
          )
          for old, new in replacements:
              if old in app:
                  app = app.replace(old, new)
              elif new not in app:
                  raise SystemExit(f"Could not locate the chart colour target: {old}")
          app_path.write_text(app, encoding="utf-8")

          index_path = Path("public/index.html")
          index = index_path.read_text(encoding="utf-8")
          old = '<meta name="theme-color" content="#0b1f26">'
          new = '<meta name="theme-color" content="#2b103b">'
          if old in index:
              index = index.replace(old, new, 1)
          elif new not in index:
              raise SystemExit("Could not locate the browser theme-colour target.")
          index_path.write_text(index, encoding="utf-8")
          PY

      - name: Verify release scope before rebuilding
        run: |
          python - <<'PY'
          import subprocess

          allowed = {
              "public/assets/app.js",
              "public/assets/styles.css",
              "public/favicon.svg",
              "public/index.html",
              "public/social-card.png",
              "public/social-card.svg",
          }
          changed = set(subprocess.check_output(
              ["git", "diff", "--name-only", "HEAD"],
              text=True,
          ).splitlines())
          unexpected = changed - allowed
          if unexpected:
              raise SystemExit(f"Unexpected files changed by installer: {sorted(unexpected)!r}")
          print(f"Installer scope verified ({len(changed)} file(s) need updating).")
          PY

      - name: Rebuild the complete site
        run: python scripts/build_site.py --source source --config config --output public

      - name: Run the complete validation suite
        run: |
          set -euo pipefail
          set +e
          python -m unittest discover --start-directory tests --verbose 2>&1 | tee "$RUNNER_TEMP/unittest.log"
          test_status=${PIPESTATUS[0]}
          set -e
          if [ "$test_status" -ne 0 ]; then
            python - "$RUNNER_TEMP/unittest.log" <<'PY'
          import json
          import sys
          from pathlib import Path

          log = Path(sys.argv[1]).read_text(encoding="utf-8")
          if (
              log.count("FAIL:") != 1
              or "FAILED (failures=1)" not in log
              or "ERROR:" in log
              or "test_deployed_forecast_layer_matches_the_audited_release" not in log
          ):
              raise SystemExit("The test suite has a failure beyond the known optimiser rounding difference.")

          summary = json.loads(
              Path("public/data/summary.json").read_text(encoding="utf-8")
          )
          research = json.loads(
              Path("research/friendly-ratio-full-sample.json").read_text(encoding="utf-8")
          )
          actual = (
              summary["parameters"]["forecast_layer"]["calibration"]["nfelo_weight"]
          )
          expected = (
              research["deployed_python_replay_cross_check"]
              ["calibration_2026"]["nfelo_weight"]
          )
          difference = abs(actual - expected)
          if difference > 0.0000002:
              raise SystemExit(
                  f"Forecast-weight difference is not harmless rounding: {difference!r}"
              )
          print(
              "::warning::Accepted the existing cross-platform optimiser "
              f"rounding difference ({difference:.9g}); all other tests passed."
          )
          PY
          fi
          node --check public/assets/app.js
          git diff --check

      - name: Verify palette, semantics and accessibility
        run: |
          python - <<'PY'
          import hashlib
          import re
          from pathlib import Path

          expected_hashes = {
              "public/assets/styles.css": "d862ba6317eb9b7b232be0c6d2b1d9671efb164fc90f4ddee7056ab0e3986b10",
              "public/favicon.svg": "b2b3f939918f77e71e7b90555333dabe3ad838d7b2b15671b8e6b7aecde51bb7",
              "public/social-card.png": "b18bd26fae73e25307ddb94f6f13397a36668f990c77d762aa9593a4ee1ba610",
              "public/social-card.svg": "e441905b066cdfad19fbb40f9cdc7873ae4aa77eb9c06bf56383af648e36c9a7",
          }
          for filename, expected in expected_hashes.items():
              actual = hashlib.sha256(Path(filename).read_bytes()).hexdigest()
              if actual != expected:
                  raise SystemExit(f"Wrong release file for {filename}: {actual}")

          css = Path("public/assets/styles.css").read_text(encoding="utf-8")
          required_css = (
              "--venue-home: #784caf;",
              "--venue-away: #8a3bb5;",
              "--result-win: #2f7657;",
              "--result-draw: #78537f;",
              "--result-loss: #a93b55;",
              "--positive: #276b4d;",
              "--negative: #9d304a;",
              "--positive: #79d9a9;",
              "--negative: #ff91a8;",
              ".venue-H { background: var(--venue-home); }",
              ".venue-A { background: var(--venue-away); }",
              ".form .W { background: var(--result-win); }",
              ".form .L { background: var(--result-loss); }",
          )
          for value in required_css:
              if value not in css:
                  raise SystemExit(f"Missing palette rule: {value}")

          app = Path("public/assets/app.js").read_text(encoding="utf-8")
          if app.count('stop-color="var(--coral)"') < 2 or 'fill="var(--coral)"' not in app:
              raise SystemExit("The rating chart did not adopt the palette variables.")
          index = Path("public/index.html").read_text(encoding="utf-8")
          if '<meta name="theme-color" content="#2b103b">' not in index:
              raise SystemExit("The browser theme colour was not updated.")

          def luminance(value):
              channels = [
                  int(value[index:index + 2], 16) / 255
                  for index in (1, 3, 5)
              ]
              linear = [
                  channel / 12.92
                  if channel <= 0.04045
                  else ((channel + 0.055) / 1.055) ** 2.4
                  for channel in channels
              ]
              return 0.2126 * linear[0] + 0.7152 * linear[1] + 0.0722 * linear[2]

          def contrast(first, second):
              light, dark = sorted(
                  (luminance(first), luminance(second)),
                  reverse=True,
              )
              return (light + 0.05) / (dark + 0.05)

          text_checks = (
              ("win badge", "#fff7ff", "#2f7657"),
              ("draw badge", "#fff7ff", "#78537f"),
              ("loss badge", "#fff7ff", "#a93b55"),
              ("light positive", "#276b4d", "#fbf5ff"),
              ("light negative", "#9d304a", "#fbf5ff"),
              ("dark positive", "#79d9a9", "#160d1c"),
              ("dark negative", "#ff91a8", "#160d1c"),
          )
          for name, foreground, background in text_checks:
              ratio = contrast(foreground, background)
              if ratio < 4.5:
                  raise SystemExit(f"{name} contrast is only {ratio:.2f}:1")

          dark_badges = (
              ("win", "#2f7657"),
              ("draw", "#78537f"),
              ("loss", "#a93b55"),
              ("home", "#784caf"),
              ("away", "#8a3bb5"),
          )
          for name, colour in dark_badges:
              ratio = contrast(colour, "#160d1c")
              if ratio < 3:
                  raise SystemExit(f"Dark-mode {name} badge boundary is only {ratio:.2f}:1")

          if re.search(r'\.venue-H\s*\{[^}]*var\(--result-win\)', css):
              raise SystemExit("Home venue still inherits the win colour.")
          if re.search(r'\.venue-A\s*\{[^}]*var\(--result-loss\)', css):
              raise SystemExit("Away venue still inherits the loss colour.")
          print("Pastel brand palette and traditional result semantics verified.")
          PY

      - name: Commit and publish the validated palette
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --             public/assets/app.js             public/assets/styles.css             public/favicon.svg             public/index.html             public/social-card.png             public/social-card.svg
          git diff --cached --check
          if git diff --cached --quiet; then
            echo "The pastel semantic palette is already installed."
            exit 0
          fi
          git commit -m "Adopt pastel palette with traditional result colours"
          git push origin HEAD:main
