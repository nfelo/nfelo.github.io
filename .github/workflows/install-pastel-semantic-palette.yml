name: Install pastel semantic palette

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: install-pastel-semantic-palette
  cancel-in-progress: false

jobs:
  install:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Confirm repository
        run: |
          set -euo pipefail
          if [ "$GITHUB_REPOSITORY" != "nfelo/nfelo.github.io" ]; then
            echo "::error::This installer is only for nfelo/nfelo.github.io."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install reproducible runtime
        run: python -m pip install --requirement requirements.txt

      - name: Install the visual release
