name: Install match navigation

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install navigation update
        env:
          UPDATE_ARCHIVE: 
        run: |
          printf '%s' "$UPDATE_ARCHIVE" | base64 --decode > /tmp/match-pagination.tar.xz
          tar -xJf /tmp/match-pagination.tar.xz
          node --check public/assets/app.js
      - name: Commit update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/assets/app.js public/assets/styles.css
          git commit -m "Improve match history navigation"
          git push
