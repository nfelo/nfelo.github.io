name: Deploy evidence-backed friendly classification v4

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-friendly-classification-0-75185-v4
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out current main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install reproducible runtime
        run: python -m pip install --requirement requirements.txt

      - name: Protect deployment invariants
        shell: bash
        run: |
          set -euo pipefail
          sha256sum .github/workflows/pages.yml \
            > /tmp/pages-workflow.sha256
          cp source/prospective_forecasts.jsonl \
            /tmp/prospective_forecasts.jsonl

