      - name: Audit tournament coverage
        shell: bash
        run: |
          set -euo pipefail
          args=(
            --source source
            --config config
            --registry config/tournament_classification.json
            --output build/tournament-classification
            --fail-on-any-new
          )
          if [ -f config/tournament_evidence.json ]; then
            args+=(--evidence config/tournament_evidence.json)
          fi
          python scripts/tournament_classification.py "${args[@]}"

          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(
              Path(
                  "build/tournament-classification/"
                  "tournament_classification_audit.json"
              ).read_text(encoding="utf-8")
          )
          summary = payload["summary"]
          assert summary["matches"] >= 52312, summary
          assert (
              summary["model_match_counts"]["friendly"]
              == 19829
          ), summary
          assert (
              summary["model_match_counts"]["competitive"]
              >= 32483
          ), summary
          assert summary["new_codes"] == 0, summary
          PY

      - name: Rebuild the complete site
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_site.py \
            --source source \
            --config config \
            --output public

      - name: Verify model, copy and browser application
        shell: bash
        run: |
          set -euo pipefail
          python -m unittest discover \
            --start-directory tests \
            --verbose
          node --check public/assets/app.js
          python scripts/audit_site_consistency.py \
            --public public

          python - <<'PY'
          import json
          from pathlib import Path

          summary = json.loads(
              Path("public/data/summary.json").read_text(
                  encoding="utf-8"
              )
          )
          state = json.loads(
              Path("public/data/state.json").read_text(
                  encoding="utf-8"
              )
          )
          app = Path(
              "public/assets/app.js"
          ).read_text(encoding="utf-8")

          assert (
              summary["meta"]["methodology_version"]
              == "2026-07-23-evidence-backed-friendly-0.75185"
          )
          assert (
              summary["parameters"]["network"][
                  "friendly_information_ratio"
              ]
              == 0.75185
          )
          temperatures = summary["parameters"]["forecast_temperature"]
          # Public JSON is compacted to eight decimal places by build_site.py.
          # Validate against the unrounded deployment constants with a tolerance
          # tighter than one unit in the published final decimal place.
          assert abs(
              temperatures["friendly"] - 0.890607603114
          ) < 0.00000001, temperatures
          assert abs(
              temperatures["competitive"] - 1.05583721825
          ) < 0.00000001, temperatures
          replay = summary["validation"]["retrospective"]
          assert replay["matches"] == 46801
          assert abs(
              replay["log_loss"] - 0.8801306569302232
          ) < 0.00005
          calibration = state["forecast_layer"]["calibration"]
          assert calibration["training_matches"] == 7922
          assert abs(
              calibration["draw_log_tilt"]
              - 0.1508727854394914
          ) < 0.00005
          assert abs(
              calibration["nfelo_weight"]
              - 0.5405971899067039
          ) < 0.00005
          assert (
              "Why is a friendly’s rating change not always "
              "75.2% of a competitive match?"
          ) in app
          assert "0.63901" not in app
          assert "0.75185" not in app
          assert app.count(
              "number(p.network.friendly_information_ratio, 5)"
          ) == 1
          PY

