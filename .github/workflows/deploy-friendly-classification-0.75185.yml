            tests/test_tournament_classification.py \
            docs/model-validation.md \
            docs/tournament-classification-method.md \
            research/friendly-ratio-full-sample.json \
            research/friendly-ratio-local-grid.csv \
            research/methodology-audit-2026-07-19/prepare_matches.py \
            research/methodology-audit-2026-07-19/capture_deployed.py \
            public/assets/app.js

          if ! git diff --quiet -- .github/workflows \
            || ! git diff --cached --quiet -- .github/workflows; then
            echo "::error::A workflow file changed unexpectedly."
            git status --short -- .github/workflows
            exit 1
          fi

          if git diff --cached --quiet; then
            echo "No deployment changes to commit."
