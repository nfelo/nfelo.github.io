name: Install corrected number one filters

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: install-site-features
  cancel-in-progress: true

jobs:
  install:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      UPDATE_ARCHIVE: >-
        
      UPDATE_SHA256: 64e7671677cbb29381ed37a5717193b1a7adf34485b0ebdb2f7b4fcdcce7deb8

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install reproducible runtime
        run: python -m pip install --requirement requirements.txt

      - name: Verify and apply the corrected filters
        run: |
          printf '%s' "$UPDATE_ARCHIVE" | tr -d '[:space:]' | base64 --decode > /tmp/nfelo-number-one-filter-range.tar.xz
          echo "$UPDATE_SHA256  /tmp/nfelo-number-one-filter-range.tar.xz" | sha256sum --check
          tar -xJf /tmp/nfelo-number-one-filter-range.tar.xz -C .
          node --check public/assets/app.js
          python -m py_compile tests/test_build.py

      - name: Rebuild and run all tests
        run: |
          python scripts/build_site.py --source source --config config --output public
          python -m unittest discover --start-directory tests --verbose
          node --check public/assets/app.js

      - name: Commit and publish the corrected filters
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- public/assets/app.js public/assets/styles.css tests/test_build.py
          if git diff --cached --quiet; then
            echo "The corrected number-one filters are already installed."
          else
            git commit -m "fix(records): validate number one date ranges"
            git push
          fi
