name: Improve Records filters and historical labels

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: improve-records-filters-labels
  cancel-in-progress: false

jobs:
  install:
    name: Improve Records and tournament defaults
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Check out main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install reproducible runtime
        run: python -m pip install --requirement requirements.txt

      - name: Install Records filters and historical naming safeguards
        shell: bash
        run: |
          set -euo pipefail

          python <<'PY'
          from pathlib import Path
          import re
          import textwrap


          APP_PATH = Path("public/assets/app.js")
          BUILD_PATH = Path("scripts/build_site.py")
          TEST_PATH = Path("tests/test_build.py")

          app = APP_PATH.read_text(encoding="utf-8")
          builder = BUILD_PATH.read_text(encoding="utf-8")
          tests = TEST_PATH.read_text(encoding="utf-8")


          # Migrate exact regression contracts that predate the requested
          # public name, Rank change option and unified Records filters.
          tests = re.sub(
              (
                  r'(?m)^(?P<indent>\s*)self\.assertIn\('
                  r'(?P<quote>["\'])USSR(?P=quote),\s*names\)\s*$'
              ),
              (
                  r'\g<indent>self.assertIn("Soviet Union", names)'
                  "\n"
                  r'\g<indent>self.assertNotIn("USSR", names)'
              ),
              tests,
          )

          old_sort_join = (
              '<option value="rating_change">'
              "Rating change</option>'\n"
              "            '<option value=\"name\">Name</option>"
          )
          new_sort_join = (
              '<option value="rating_change">'
              "Rating change</option>'\n"
              "            '<option value=\"rank_change\">"
              "Rank change</option>'\n"
              "            '<option value=\"name\">Name</option>"
          )
          if (
              'value="rank_change">Rank change' not in tests
              and old_sort_join in tests
          ):
              tests = tests.replace(
                  old_sort_join,
                  new_sort_join,
                  1,
              )

          tests = tests.replace(
              (
                  'historical_opponents.intersection('
                  '{"USSR", "Czechoslovakia", "Yugoslavia"}'
                  ')'
              ),
              (
                  'historical_opponents.intersection('
                  '{"Soviet Union", "Czechoslovakia", '
                  '"Yugoslavia"}'
                  ')'
              ),
          )

          old_number_one_filter_assertions = (
              (
                  "        self.assertIn("
                  "'const filtering = view === "
                  '"numberones";'
                  "', javascript)\n"
              ),
              (
                  '        self.assertIn('
                  '"const filtering = view === '
                  '\\"numberones\\";", javascript)\n'
              ),
          )
          new_number_one_filter_assertion = (
              "        self.assertIn("
              "'numberOneFilters.hidden = view !== "
              '"numberones";'
              "', javascript)\n"
          )
          for old_assertion in old_number_one_filter_assertions:
              if old_assertion in tests:
                  tests = tests.replace(
                      old_assertion,
                      new_number_one_filter_assertion,
                      1,
                  )

          old_record_contract = (
              '            "Explore nation peaks, No. 1 chronology '
              'and totals",\n'
              '            "const bestTournamentCurrentNames = '
              'new Map(",\n'
              '            "const bestTournamentAliases = '
              'new Map();",\n'
              '            "label: displayAliases.length",\n'
              '            "escapeHTML(team.label)",\n'
          )
          new_record_contract = (
              '            "Explore team peaks, No. 1 chronology '
              'and totals",\n'
              '            \'id="peak-team-search"\',\n'
              '            \'id="record-list-team"\',\n'
              '            \'id="record-list-competition"\',\n'
              '            "currentFirstRecordLabel",\n'
              '            "peakRecordLabel",\n'
          )
          if old_record_contract in tests:
              tests = tests.replace(
                  old_record_contract,
                  new_record_contract,
                  1,
              )


          def replace_once(
              text: str,
              old: str,
              new: str,
              description: str,
          ) -> str:
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(
                      f"Expected exactly one {description}; found {count}"
                  )
              return text.replace(old, new, 1)


          build_helpers = textwrap.dedent(r'''
          SOVIET_PUBLIC_START = "1922-12-30"
          SOVIET_PUBLIC_END = "1991-12-26"

          MODEL_VERIFICATION_MATCH_KEYS = (
              "id",
              "date",
              "year",
              "a",
              "b",
              "sa",
              "sb",
              "tc",
              "level",
              "home",
              "p",
              "expected",
              "pre_a",
              "pre_b",
              "post_a",
              "post_b",
              "impact_a",
              "impact_b",
              "combined",
          )


          def model_verification_fingerprint(output: Any) -> str:
              # Hash model/source facts that public-label edits may not alter.
              payload = {
                  "source_sha256": output.summary["meta"]["source_sha256"],
                  "state": output.state,
                  "matches": [
                      {
                          key: row.get(key)
                          for key in MODEL_VERIFICATION_MATCH_KEYS
                      }
                      for row in output.matches
                  ],
              }
              serialised = json.dumps(
                  compact(payload),
                  ensure_ascii=False,
                  sort_keys=True,
                  separators=(",", ":"),
              )
              return hashlib.sha256(
                  serialised.encode("utf-8")
              ).hexdigest()


          def historical_public_team_name(
              code: str | None,
              value: Any,
              day: str,
          ) -> Any:
              # Correct only public labels; never touch model/source identity.
              name = public_team_name(value)
              if (
                  isinstance(name, str)
                  and SOVIET_PUBLIC_START <= str(day) <= SOVIET_PUBLIC_END
                  and name in {"Russia", "Soviet Union"}
                  and code in {None, "RU"}
              ):
                  return "Soviet Union"
              return name


          def normalise_historical_public_names(output: Any) -> None:
              # Make Soviet-era public labels date-correct after replay.
              matches_by_id: dict[int, dict[str, Any]] = {}

              for match in output.matches:
                  day = str(match["date"])
                  match["an"] = historical_public_team_name(
                      str(match["a"]),
                      match.get("an"),
                      day,
                  )
                  match["bn"] = historical_public_team_name(
                      str(match["b"]),
                      match.get("bn"),
                      day,
                  )
                  matches_by_id[int(match["id"])] = match

              for code, page in output.team_pages.items():
                  for point in page.get("history", []):
                      day = str(point["date"])
                      match = matches_by_id.get(int(point["id"]))
                      if match is not None:
                          if code == match["a"]:
                              point["historical_name"] = match["an"]
                              point["opponent"] = match["bn"]
                          elif code == match["b"]:
                              point["historical_name"] = match["bn"]
                              point["opponent"] = match["an"]
                      else:
                          point["historical_name"] = (
                              historical_public_team_name(
                                  code,
                                  point.get("historical_name"),
                                  day,
                              )
                          )
                          point["opponent"] = (
                              historical_public_team_name(
                                  None,
                                  point.get("opponent"),
                                  day,
                              )
                          )

                  for row in page.get("matches", []):
                      match = matches_by_id.get(int(row["id"]))
                      if match is None:
                          day = str(row["date"])
                          row["team_name"] = historical_public_team_name(
                              code,
                              row.get("team_name"),
                              day,
                          )
                          row["opponent"] = historical_public_team_name(
                              row.get("opponent_code"),
                              row.get("opponent"),
                              day,
                          )
                          continue
                      if code == match["a"]:
                          row["team_name"] = match["an"]
                          row["opponent"] = match["bn"]
                      elif code == match["b"]:
                          row["team_name"] = match["bn"]
                          row["opponent"] = match["an"]

              for peak in output.summary.get("peaks", []):
                  day = str(peak["date"])
                  peak["historical_name"] = historical_public_team_name(
                      str(peak["code"]),
                      peak.get("historical_name"),
                      day,
                  )
                  peak["opponent"] = historical_public_team_name(
                      None,
                      peak.get("opponent"),
                      day,
                  )

              for collection in ("top_matches", "upsets"):
                  for row in output.summary.get(collection, []):
                      day = str(row["date"])
                      row["team1"] = historical_public_team_name(
                          str(row["code1"]),
                          row.get("team1"),
                          day,
                      )
                      row["team2"] = historical_public_team_name(
                          str(row["code2"]),
                          row.get("team2"),
                          day,
                      )
                      if "winner" in row:
                          row["winner"] = historical_public_team_name(
                              None,
                              row.get("winner"),
                              day,
                          )
                      if "loser" in row:
                          row["loser"] = historical_public_team_name(
                              None,
                              row.get("loser"),
                              day,
                          )


          def attach_lineage_names(output: Any) -> None:
              # Attach only names genuinely used by each canonical lineage.
              names: dict[str, set[str]] = {}
              for match in output.matches:
                  for code_key, name_key in (
                      ("a", "an"),
                      ("b", "bn"),
                  ):
                      code = str(match.get(code_key, ""))
                      name = str(match.get(name_key, "")).strip()
                      if code and name:
                          names.setdefault(code, set()).add(name)

              current_names = {
                  team["code"]: str(team["nation"])
                  for team in output.summary.get("teams", [])
              }
              for code, name in current_names.items():
                  names.setdefault(code, set()).add(name)

              lineage_rows = {
                  code: sorted(
                      values,
                      key=lambda value: value.casefold(),
                  )
                  for code, values in names.items()
              }
              for collection in ("teams", "current"):
                  for team in output.summary.get(collection, []):
                      team["lineage_names"] = lineage_rows.get(
                          team["code"],
                          [team["nation"]],
                      )
          ''').strip() + "\n\n"

          if "def normalise_historical_public_names(" not in builder:
              marker = "\ndef attach_team_aliases(\n"
              if builder.count(marker) != 1:
                  raise RuntimeError(
                      "Could not locate attach_team_aliases insertion point."
                  )
              builder = builder.replace(
                  marker,
                  "\n" + build_helpers + "def attach_team_aliases(\n",
                  1,
              )

          old_main = (
              "    output = run_replay(args.source, args.config)\n"
              "    normalise_public_team_names(output.summary)\n"
              "    normalise_public_team_names(output.team_pages)\n"
              "    normalise_public_team_names(output.matches)\n"
              "    attach_team_aliases(output, args.source)\n"
          )
          new_main = (
              "    output = run_replay(args.source, args.config)\n"
              "    verification_before = "
              "model_verification_fingerprint(output)\n"
              "    normalise_historical_public_names(output)\n"
              "    normalise_public_team_names(output.summary)\n"
              "    normalise_public_team_names(output.team_pages)\n"
              "    normalise_public_team_names(output.matches)\n"
              "    attach_team_aliases(output, args.source)\n"
              "    attach_lineage_names(output)\n"
              "    verification_after = "
              "model_verification_fingerprint(output)\n"
              "    if verification_after != verification_before:\n"
              "        raise RuntimeError(\n"
              "            \"Public label normalisation changed model "
              "verification data.\"\n"
              "        )\n"
          )
          if "verification_before = model_verification_fingerprint" not in builder:
              builder = replace_once(
                  builder,
                  old_main,
                  new_main,
                  "post-replay public-label block",
              )

          number_one_labels = textwrap.indent(
              textwrap.dedent(r'''
              names_at_number_one: dict[str, list[str]] = {}
              for spell in number_ones:
                  code = spell["code"]
                  name = str(spell["nation"])
                  if name not in names_at_number_one.setdefault(code, []):
                      names_at_number_one[code].append(name)

              for row in output.summary["number_one_summary"]:
                  spell_names = names_at_number_one.get(
                      row["code"],
                      [row["nation"]],
                  )
                  current_name = names[row["code"]]
                  if current_name in spell_names:
                      primary_name = current_name
                  else:
                      primary_name = spell_names[-1]
                  row["nation"] = primary_name
                  row["included_names"] = [
                      name
                      for name in spell_names
                      if name != primary_name
                  ]

              ''').strip() + "\n\n",
              "    ",
          )
          if "names_at_number_one:" not in builder:
              marker = (
                  '    tournament_catalog = build_tournament_catalog('
                  'output.matches)\n'
              )
              if builder.count(marker) != 1:
                  raise RuntimeError(
                      "Could not locate number-one label insertion point."
                  )
              builder = builder.replace(
                  marker,
                  number_one_labels + marker,
                  1,
              )


          tournament_helper = textwrap.dedent(r'''
            const MAJOR_TOURNAMENT_PRECEDENCE = [
              "FIFA World Cup",
              "UEFA European Championship",
              "Copa América",
              "Africa Cup of Nations",
              "AFC Asian Cup",
              "CONCACAF Gold Cup",
              "OFC Nations Cup",
            ];

            function defaultMajorTournamentFamily(families) {
              const major = families
                .filter(
                  (family) => (
                    MAJOR_TOURNAMENT_PRECEDENCE.includes(
                      family.name,
                    )
                    && family.editions?.length
                  ),
                )
                .map((family) => {
                  const edition = [...family.editions].sort(
                    (first, second) => (
                      String(second.after).localeCompare(
                        String(first.after),
                      )
                    ),
                  )[0];
                  return {
                    family,
                    edition,
                    time: new Date(
                      `${edition.after}T00:00:00Z`,
                    ).valueOf(),
                  };
                })
                .filter((candidate) => Number.isFinite(candidate.time));

              if (!major.length) return null;

              const newestTime = Math.max(
                ...major.map((candidate) => candidate.time),
              );
              const thirtyDays = 30 * 24 * 60 * 60 * 1000;
              const closeTogether = major.filter(
                (candidate) => (
                  newestTime - candidate.time <= thirtyDays
                ),
              );
              closeTogether.sort(
                (first, second) => (
                  MAJOR_TOURNAMENT_PRECEDENCE.indexOf(
                    first.family.name,
                  )
                  - MAJOR_TOURNAMENT_PRECEDENCE.indexOf(
                    second.family.name,
                  )
                  || second.time - first.time
                ),
              );
              return closeTogether[0]?.family || null;
            }

          ''')
          if "function defaultMajorTournamentFamily(" not in app:
              marker = "  async function renderTournaments(route) {\n"
              if app.count(marker) != 1:
                  raise RuntimeError(
                      "Could not locate renderTournaments."
                  )
              app = app.replace(
                  marker,
                  tournament_helper + marker,
                  1,
              )

          old_default = (
              '    const defaultFamily = families.find(\n'
              '      (family) => family.name === "FIFA World Cup",\n'
              '    ) || families[0];\n'
          )
          new_default = (
              '    const defaultFamily = (\n'
              '      defaultMajorTournamentFamily(families)\n'
              '      || families[0]\n'
              '    );\n'
          )
          if "defaultMajorTournamentFamily(families)" not in app[
              app.index("async function renderTournaments"):
          ]:
              app = replace_once(
                  app,
                  old_default,
                  new_default,
                  "hard-coded tournament default",
              )


          app = app.replace(
              "teamLink(peak.code, peak.nation)",
              "teamLink(peak.code, peak.display_nation || peak.nation)",
          )
          app = app.replace(
              "teamLink(row.code, row.nation)</td><td class=\"numeric\"><span class=\"rating-main\">${number(row.days)}",
              "teamLink(row.code, row.display_nation || row.nation)</td><td class=\"numeric\"><span class=\"rating-main\">${number(row.days)}",
          )
          app = app.replace(
              "teamLink(row.code, row.nation, row.after)",
              "teamLink(row.code, row.display_nation || row.nation, row.after)",
          )

          records_function = textwrap.dedent(r'''
            function renderRecords(route) {
              setTitle("Records");
              const recordTeamByCode = new Map(
                summary.teams.map((team) => [team.code, team]),
              );
              const currentRecordName = (code) => publicTeamName(
                recordTeamByCode.get(code)?.nation || code,
              );
              const uniqueRecordNames = (values) => [
                ...new Set(
                  values
                    .map(publicTeamName)
                    .map((value) => String(value).trim())
                    .filter(Boolean),
                ),
              ];

              const currentFirstRecordLabel = (code, values) => {
                const current = currentRecordName(code);
                const names = uniqueRecordNames([current, ...values]);
                const first = names.shift() || code;
                return names.length
                  ? `${first} (incl. ${names.join(", ")})`
                  : first;
              };

              const peakRecordLabel = (peak) => {
                const current = currentRecordName(peak.code);
                const peakName = publicTeamName(
                  peak.historical_name || peak.nation,
                );
                const lineage = uniqueRecordNames(
                  recordTeamByCode.get(peak.code)?.lineage_names || [],
                );
                if (peakName !== current) {
                  return current
                    ? `${peakName} (incl. ${current})`
                    : peakName;
                }
                const former = lineage.filter(
                  (name) => name !== current,
                );
                return former.length
                  ? `${current} (incl. ${former.join(", ")})`
                  : current;
              };

              const peakRows = (summary.peaks || [])
                .slice(0, 500)
                .map((row) => ({
                  ...row,
                  display_nation: peakRecordLabel(row),
                }));
              const numberOneRows = summary.number_ones || [];
              const numberOneSummaryRows = (
                summary.number_one_summary || []
              ).map((row) => ({
                ...row,
                display_nation: row.included_names?.length
                  ? (
                    `${publicTeamName(row.nation)} `
                    + `(incl. ${row.included_names
                      .map(publicTeamName)
                      .join(", ")})`
                  )
                  : publicTeamName(row.nation),
              }));
              const highestMatchRows = (
                summary.top_matches || []
              ).slice(0, 500);
              const upsetRows = (summary.upsets || []).slice(0, 500);
              const bestTournamentRows = (
                summary.best_tournaments || []
              ).slice(0, 500);

              const pairSources = {
                matches: highestMatchRows,
                upsets: upsetRows,
                tournaments: bestTournamentRows,
              };
              const pairViews = new Set(Object.keys(pairSources));

              const recordTeamChoices = (rows, recordView) => {
                const namesByCode = new Map();
                const add = (code, name) => {
                  if (!code) return;
                  if (!namesByCode.has(code)) {
                    namesByCode.set(code, []);
                  }
                  namesByCode.get(code).push(name);
                };
                rows.forEach((row) => {
                  if (recordView === "tournaments") {
                    add(row.code, row.nation);
                  } else {
                    add(row.code1, row.team1);
                    add(row.code2, row.team2);
                  }
                });
                return [...namesByCode.entries()]
                  .map(([code, names]) => ({
                    code,
                    label: currentFirstRecordLabel(code, names),
                  }))
                  .sort(
                    (first, second) => (
                      first.label.localeCompare(second.label)
                      || first.code.localeCompare(second.code)
                    ),
                  );
              };

              const recordCompetitions = (rows) => [
                ...new Set(
                  rows
                    .map((row) => row.tournament)
                    .filter(Boolean),
                ),
              ].sort((first, second) => first.localeCompare(second));

              const tournamentLabels = new Map(
                recordTeamChoices(
                  bestTournamentRows,
                  "tournaments",
                ).map((team) => [team.code, team.label]),
              );
              bestTournamentRows.forEach((row) => {
                row.display_nation = (
                  tournamentLabels.get(row.code)
                  || row.nation
                );
              });

              const peakPlaceholder = (
                shuffledExamples(
                  peakRows.map((row) => row.display_nation),
                )
                || "Search peak teams…"
              );
              const numberOnePlaceholder = (
                shuffledExamples(
                  numberOneRows.map((row) => row.nation),
                )
                || "Search former No. 1 teams…"
              );

              content.innerHTML = `
                <div class="page">
                  <header class="page-heading"><div><p class="eyebrow">Historical rating records</p><h1>Records</h1></div><p class="lede">Explore team peaks, No. 1 chronology and totals, highest-rated matches, largest upsets and the biggest tournament rating gains.</p></header>
                  <div class="record-tabs" role="tablist" aria-label="Record type"><button class="button button-dark" role="tab" aria-controls="record-table" data-record="peaks" aria-pressed="true" aria-selected="true" tabindex="0">Team peaks</button><button class="button" role="tab" aria-controls="record-table" data-record="numberones" aria-pressed="false" aria-selected="false" tabindex="-1">No. 1 chronology</button><button class="button" role="tab" aria-controls="record-table" data-record="numberonesummary" aria-pressed="false" aria-selected="false" tabindex="-1">No. 1 totals</button><button class="button" role="tab" aria-controls="record-table" data-record="matches" aria-pressed="false" aria-selected="false" tabindex="-1">Highest-rated matches</button><button class="button" role="tab" aria-controls="record-table" data-record="upsets" aria-pressed="false" aria-selected="false" tabindex="-1">Largest upsets</button><button class="button" role="tab" aria-controls="record-table" data-record="tournaments" aria-pressed="false" aria-selected="false" tabindex="-1">Best tournaments</button></div>

                  <div id="peak-filters" class="toolbar record-filters" hidden>
                    <div class="field field-grow"><label for="peak-team-search">Find a team</label><input id="peak-team-search" type="search" placeholder="${escapeHTML(peakPlaceholder)}" value="${escapeHTML(route.query.get("peak") || "")}"></div>
                  </div>

                  <div id="number-one-filters" class="toolbar record-filters" hidden>
                    <div class="field field-grow"><label for="number-one-team">Filter team</label><input id="number-one-team" type="search" placeholder="${escapeHTML(numberOnePlaceholder)}" value="${escapeHTML(route.query.get("q") || "")}"></div>
                    <div class="field"><label for="number-one-from">From date</label><div class="date-combo"><input id="number-one-from" type="text" inputmode="numeric" autocomplete="off" maxlength="10" placeholder="DD/MM/YYYY" value="${route.query.get("from") ? validDate(route.query.get("from")) : ""}" aria-describedby="number-one-from-error"><button class="button" type="button" id="number-one-from-button" aria-label="Open from-date calendar">Calendar</button><input id="number-one-from-calendar" class="native-date-proxy" type="date" min="1872-01-01" max="${summary.meta.results_through}" value="${escapeHTML(route.query.get("from") || "")}" tabindex="-1" aria-hidden="true"></div><span id="number-one-from-error" class="field-error" role="alert"></span></div>
                    <div class="field"><label for="number-one-to">To date</label><div class="date-combo"><input id="number-one-to" type="text" inputmode="numeric" autocomplete="off" maxlength="10" placeholder="DD/MM/YYYY" value="${route.query.get("to") ? validDate(route.query.get("to")) : ""}" aria-describedby="number-one-to-error"><button class="button" type="button" id="number-one-to-button" aria-label="Open to-date calendar">Calendar</button><input id="number-one-to-calendar" class="native-date-proxy" type="date" min="1872-01-01" max="${summary.meta.results_through}" value="${escapeHTML(route.query.get("to") || "")}" tabindex="-1" aria-hidden="true"></div><span id="number-one-to-error" class="field-error" role="alert"></span></div>
                  </div>

                  <div id="record-list-filters" class="toolbar record-filters best-tournament-filters" hidden>
                    <div class="field">
                      <label for="record-list-team">Team</label>
                      <select id="record-list-team">
                        <option value="">Any team</option>
                      </select>
                    </div>
                    <div class="field field-grow">
                      <label for="record-list-competition">Competition</label>
                      <input id="record-list-competition" type="search" list="record-competition-suggestions" placeholder="Competition…" value="${escapeHTML(route.query.get("competition") || "")}">
                      <datalist id="record-competition-suggestions"></datalist>
                    </div>
                  </div>

                  <div id="record-note" class="record-note"></div>
                  <div id="record-table" role="tabpanel" tabindex="0" aria-live="polite"></div>
                  <div class="pagination"><span id="record-count" class="muted small" aria-live="polite"></span><div class="pagination-actions"><button id="record-more" class="button">Show more</button><button id="record-all" class="button button-quiet">Show all</button></div></div>
                </div>`;

              let view = [
                "peaks",
                "numberones",
                "numberonesummary",
                "matches",
                "upsets",
                "tournaments",
              ].includes(route.query.get("view"))
                ? route.query.get("view")
                : "peaks";
              let shown = (
                Math.max(
                  25,
                  Number(route.query.get("shown") || 25),
                )
                || 25
              );

              const sources = {
                peaks: peakRows,
                numberones: numberOneRows,
                numberonesummary: numberOneSummaryRows,
                matches: highestMatchRows,
                upsets: upsetRows,
                tournaments: bestTournamentRows,
              };
              const peakFilters = document.getElementById(
                "peak-filters",
              );
              const numberOneFilters = document.getElementById(
                "number-one-filters",
              );
              const listFilters = document.getElementById(
                "record-list-filters",
              );
              const listTeam = document.getElementById(
                "record-list-team",
              );
              const listCompetition = document.getElementById(
                "record-list-competition",
              );
              const competitionSuggestions = document.getElementById(
                "record-competition-suggestions",
              );

              const configureListFilters = (
                preferredTeam = "",
                preserveCompetition = true,
              ) => {
                if (!pairViews.has(view)) return;
                const source = pairSources[view];
                const choices = recordTeamChoices(source, view);
                listTeam.innerHTML = (
                  '<option value="">Any team</option>'
                  + choices.map(
                    (team) => (
                      `<option value="${escapeHTML(team.code)}">`
                      + `${escapeHTML(team.label)}</option>`
                    ),
                  ).join("")
                );
                listTeam.value = choices.some(
                  (team) => team.code === preferredTeam,
                )
                  ? preferredTeam
                  : "";

                const competitions = recordCompetitions(source);
                listCompetition.placeholder = (
                  shuffledExamples(competitions)
                  || "Competition…"
                );
                competitionSuggestions.innerHTML = competitions.map(
                  (competition) => (
                    `<option value="${escapeHTML(competition)}"></option>`
                  ),
                ).join("");
                if (!preserveCompetition) {
                  listCompetition.value = "";
                }
              };

              const syncFilterVisibility = () => {
                peakFilters.hidden = view !== "peaks";
                numberOneFilters.hidden = view !== "numberones";
                listFilters.hidden = !pairViews.has(view);
              };

              configureListFilters(
                route.query.get("team") || "",
                true,
              );
              syncFilterVisibility();

              document.querySelectorAll("[data-record]").forEach(
                (button) => {
                  const active = button.dataset.record === view;
                  button.setAttribute("aria-pressed", String(active));
                  button.setAttribute("aria-selected", String(active));
                  button.tabIndex = active ? 0 : -1;
                  button.classList.toggle("button-dark", active);
                },
              );

              const update = () => {
                const peakQuery = foldSearch(
                  document.getElementById(
                    "peak-team-search",
                  ).value,
                );
                const numberOneQuery = foldSearch(
                  document.getElementById(
                    "number-one-team",
                  ).value,
                );
                const selectedTeam = listTeam.value;
                const competitionQuery = foldSearch(
                  listCompetition.value,
                );
                const fromInput = document.getElementById(
                  "number-one-from",
                );
                const toInput = document.getElementById(
                  "number-one-to",
                );
                const from = inputDate(fromInput.value);
                const to = inputDate(toInput.value);
                const invalidRange = Boolean(
                  from && to && from > to,
                );
                const fromRangeMessage = (
                  "From date cannot be after To date."
                );
                const toRangeMessage = (
                  "To date cannot be before From date."
                );
                const fromError = document.getElementById(
                  "number-one-from-error",
                );
                const toError = document.getElementById(
                  "number-one-to-error",
                );

                if (invalidRange) {
                  fromError.textContent = fromRangeMessage;
                  toError.textContent = toRangeMessage;
                  fromInput.setAttribute("aria-invalid", "true");
                  toInput.setAttribute("aria-invalid", "true");
                } else {
                  if (
                    fromError.textContent === fromRangeMessage
                  ) {
                    fromError.textContent = "";
                  }
                  if (toError.textContent === toRangeMessage) {
                    toError.textContent = "";
                  }
                  if (!fromError.textContent) {
                    fromInput.removeAttribute("aria-invalid");
                  }
                  if (!toError.textContent) {
                    toInput.removeAttribute("aria-invalid");
                  }
                }

                document.getElementById(
                  "number-one-from-calendar",
                ).max = to || summary.meta.results_through;
                document.getElementById(
                  "number-one-to-calendar",
                ).min = from || "1872-01-01";

                const source = sources[view].filter((row) => {
                  if (view === "peaks") {
                    return (
                      !peakQuery
                      || teamSearchText(
                        row.code,
                        row.nation,
                        row.historical_name,
                        row.display_nation,
                      ).includes(peakQuery)
                    );
                  }

                  if (view === "numberones") {
                    if (invalidRange) return false;
                    if (
                      numberOneQuery
                      && !teamSearchText(
                        row.code,
                        row.nation,
                      ).includes(numberOneQuery)
                    ) {
                      return false;
                    }
                    const end = (
                      row.to || summary.meta.results_through
                    );
                    if (from && end < from) return false;
                    if (to && row.from > to) return false;
                    return true;
                  }

                  if (view === "matches" || view === "upsets") {
                    if (
                      selectedTeam
                      && row.code1 !== selectedTeam
                      && row.code2 !== selectedTeam
                    ) {
                      return false;
                    }
                    return (
                      !competitionQuery
                      || foldSearch(row.tournament).includes(
                        competitionQuery,
                      )
                    );
                  }

                  if (view === "tournaments") {
                    if (
                      selectedTeam
                      && row.code !== selectedTeam
                    ) {
                      return false;
                    }
                    return (
                      !competitionQuery
                      || foldSearch(row.tournament).includes(
                        competitionQuery,
                      )
                    );
                  }

                  return true;
                });

                const visible = source.slice(0, shown);
                document.getElementById(
                  "record-note",
                ).innerHTML = view === "peaks"
                  ? `<strong>Peak</strong><div><b>One maximum per canonical team lineage.</b> A peak reached under a former name shows that historical name first; a peak reached under the current name lists relevant former lineage names afterward.</div>`
                  : view === "numberones"
                    ? `<strong>No. 1</strong><div><b>Every spell as NFELO world number one.</b> Leadership is determined jointly after all results on each date. Historical names are retained, and every relevant result from the change date is shown.</div>`
                    : view === "numberonesummary"
                      ? `<strong>Total</strong><div><b>Number-one totals use only names from actual No. 1 spells.</b> Germany includes West Germany; the Soviet Union total does not include post-Soviet Russia.</div>`
                      : view === "matches"
                        ? `<strong>Score</strong><div><b>Every eligible match instance is ranked.</b> Q is the two breadth-adjusted means minus 1.645 times their joint standard error; repeat pairings are not deduplicated.</div>`
                        : view === "upsets"
                          ? `<strong>Change</strong><div><b>Decisive results ranked by rating movement.</b> Upset points are the average of the winner's rating gain and the loser's rating loss.</div>`
                          : `<strong>Gain</strong><div><b>Largest positive rating gains over one tournament edition.</b> Rating gain includes only the edition's own matchdays.</div>`;

                document.getElementById(
                  "record-table",
                ).innerHTML = view === "peaks"
                  ? peakTable(visible)
                  : view === "numberones"
                    ? numberOneTable(visible)
                    : view === "numberonesummary"
                      ? numberOneSummaryTable(visible)
                      : view === "matches"
                        ? matchRecordTable(visible)
                        : view === "upsets"
                          ? upsetTable(visible)
                          : bestTournamentTable(visible);

                document.getElementById(
                  "record-count",
                ).textContent = (
                  `Showing ${number(visible.length)} `
                  + `of ${number(source.length)}`
                );
                document.getElementById(
                  "record-more",
                ).hidden = shown >= source.length;
                document.getElementById(
                  "record-all",
                ).hidden = shown >= source.length;

                replaceRouteQuery("records", {
                  view: view === "peaks" ? "" : view,
                  shown: shown > 25 ? shown : "",
                  peak: view === "peaks"
                    ? document.getElementById(
                      "peak-team-search",
                    ).value.trim()
                    : "",
                  q: view === "numberones"
                    ? document.getElementById(
                      "number-one-team",
                    ).value.trim()
                    : "",
                  from: (
                    view === "numberones" && !invalidRange
                      ? from
                      : ""
                  ),
                  to: (
                    view === "numberones" && !invalidRange
                      ? to
                      : ""
                  ),
                  team: pairViews.has(view)
                    ? selectedTeam
                    : "",
                  competition: pairViews.has(view)
                    ? listCompetition.value.trim()
                    : "",
                });
              };

              document.getElementById(
                "peak-team-search",
              ).addEventListener("input", () => {
                shown = 25;
                update();
              });
              document.getElementById(
                "number-one-team",
              ).addEventListener("input", () => {
                shown = 25;
                update();
              });
              listTeam.addEventListener("change", () => {
                shown = 25;
                update();
              });
              listCompetition.addEventListener("input", () => {
                shown = 25;
                update();
              });

              const setupNumberOneDate = (prefix) => {
                const input = document.getElementById(prefix);
                const calendar = document.getElementById(
                  `${prefix}-calendar`,
                );
                const errorNode = document.getElementById(
                  `${prefix}-error`,
                );
                const refreshIfValid = () => {
                  input.value = formatHistoryDateInput(input.value);
                  const error = input.value
                    ? historyDateInputError(
                      input.value,
                      "1872-01-01",
                      summary.meta.results_through,
                    )
                    : "";
                  errorNode.textContent = error;
                  if (error) {
                    input.setAttribute("aria-invalid", "true");
                  } else {
                    input.removeAttribute("aria-invalid");
                  }
                  const complete = (
                    !input.value
                    || Boolean(inputDate(input.value))
                  );
                  if (!error && complete) {
                    calendar.value = input.value
                      ? inputDate(input.value)
                      : "";
                    shown = 25;
                    update();
                  }
                };
                input.addEventListener("input", refreshIfValid);
                input.addEventListener("keydown", (event) => {
                  if (
                    event.key === "Backspace"
                    && input.selectionStart === input.selectionEnd
                    && [3, 6].includes(input.selectionStart)
                  ) {
                    event.preventDefault();
                    const position = input.selectionStart;
                    input.value = (
                      input.value.slice(0, position - 2)
                      + input.value.slice(position)
                    );
                    refreshIfValid();
                    input.setSelectionRange(
                      position - 2,
                      position - 2,
                    );
                  }
                });
                document.getElementById(
                  `${prefix}-button`,
                ).addEventListener("click", () => {
                  if (
                    typeof calendar.showPicker === "function"
                  ) {
                    calendar.showPicker();
                  } else {
                    calendar.click();
                  }
                });
                calendar.addEventListener("change", () => {
                  input.value = calendar.value
                    ? validDate(calendar.value)
                    : "";
                  refreshIfValid();
                });
              };
              setupNumberOneDate("number-one-from");
              setupNumberOneDate("number-one-to");

              document.querySelectorAll("[data-record]").forEach(
                (button) => button.addEventListener("click", () => {
                  view = button.dataset.record;
                  shown = 25;
                  if (pairViews.has(view)) {
                    configureListFilters("", false);
                  }
                  syncFilterVisibility();
                  document.querySelectorAll(
                    "[data-record]",
                  ).forEach((peer) => {
                    const active = peer === button;
                    peer.setAttribute(
                      "aria-pressed",
                      String(active),
                    );
                    peer.setAttribute(
                      "aria-selected",
                      String(active),
                    );
                    peer.tabIndex = active ? 0 : -1;
                    peer.classList.toggle(
                      "button-dark",
                      active,
                    );
                  });
                  update();
                }),
              );

              const recordTabs = [
                ...document.querySelectorAll("[data-record]"),
              ];
              recordTabs.forEach((button, index) => {
                button.addEventListener("keydown", (event) => {
                  if (
                    ![
                      "ArrowLeft",
                      "ArrowRight",
                      "Home",
                      "End",
                    ].includes(event.key)
                  ) {
                    return;
                  }
                  event.preventDefault();
                  const nextIndex = event.key === "Home"
                    ? 0
                    : event.key === "End"
                      ? recordTabs.length - 1
                      : (
                        index
                        + (
                          event.key === "ArrowRight"
                            ? 1
                            : -1
                        )
                        + recordTabs.length
                      ) % recordTabs.length;
                  recordTabs[nextIndex].focus();
                  recordTabs[nextIndex].click();
                });
              });

              document.getElementById(
                "record-more",
              ).addEventListener("click", () => {
                shown += 25;
                update();
              });
              document.getElementById(
                "record-all",
              ).addEventListener("click", () => {
                shown = Number.MAX_SAFE_INTEGER;
                update();
              });
              update();
            }
          ''').rstrip()

          if 'id="record-list-team"' not in app:
              start_marker = "  function renderRecords(route) {\n"
              end_marker = "\n  async function renderFixtures(route) {\n"
              start = app.find(start_marker)
              end = app.find(end_marker, start)
              if start < 0 or end < 0:
                  raise RuntimeError(
                      "Could not isolate the current renderRecords function."
                  )
              app = (
                  app[:start]
                  + records_function
                  + "\n"
                  + app[end:]
              )


          test_method = textwrap.dedent(r'''
              def test_record_filters_labels_and_major_tournament_default(self) -> None:
                  javascript = (
                      ROOT / "public" / "assets" / "app.js"
                  ).read_text(encoding="utf-8")
                  builder = (
                      ROOT / "scripts" / "build_site.py"
                  ).read_text(encoding="utf-8")

                  for marker in (
                      'id="peak-team-search"',
                      'id="record-list-team"',
                      'id="record-list-competition"',
                      "recordTeamChoices",
                      "recordCompetitions",
                      "peakRecordLabel",
                      "shuffledExamples(competitions)",
                      "function defaultMajorTournamentFamily",
                      "MAJOR_TOURNAMENT_PRECEDENCE",
                      (
                          "teamLink(peak.code, "
                          "peak.display_nation || peak.nation)"
                      ),
                      (
                          "teamLink(row.code, "
                          "row.display_nation || row.nation)"
                      ),
                  ):
                      self.assertIn(marker, javascript)

                  precedence = [
                      "FIFA World Cup",
                      "UEFA European Championship",
                      "Copa América",
                      "Africa Cup of Nations",
                      "AFC Asian Cup",
                      "CONCACAF Gold Cup",
                      "OFC Nations Cup",
                  ]
                  precedence_start = javascript.index(
                      "const MAJOR_TOURNAMENT_PRECEDENCE = ["
                  )
                  precedence_end = javascript.index(
                      "];",
                      precedence_start,
                  )
                  precedence_block = javascript[
                      precedence_start:precedence_end
                  ]
                  positions = [
                      precedence_block.index(f'"{name}"')
                      for name in precedence
                  ]
                  self.assertEqual(positions, sorted(positions))
                  self.assertEqual(
                      precedence_block.count('"'),
                      len(precedence) * 2,
                  )
                  self.assertIn(
                      "newestTime - candidate.time <= thirtyDays",
                      javascript,
                  )

                  for marker in (
                      "def model_verification_fingerprint",
                      "def normalise_historical_public_names",
                      "def attach_lineage_names",
                      "Public label normalisation changed model verification data.",
                  ):
                      self.assertIn(marker, builder)

                  for decade in (1950, 1960, 1970, 1980):
                      payload = json.loads(
                          (
                              self.data
                              / "matches"
                              / f"{decade}.json"
                          ).read_text(encoding="utf-8")
                      )
                      soviet_rows = [
                          row
                          for row in payload["matches"]
                          if row["a"] == "RU" or row["b"] == "RU"
                      ]
                      self.assertTrue(soviet_rows)
                      for row in soviet_rows:
                          if row["a"] == "RU":
                              self.assertEqual(
                                  row["an"],
                                  "Soviet Union",
                              )
                          if row["b"] == "RU":
                              self.assertEqual(
                                  row["bn"],
                                  "Soviet Union",
                              )

                      history = json.loads(
                          (
                              self.data
                              / "rankings-history"
                              / f"{decade}.json"
                          ).read_text(encoding="utf-8")
                      )
                      russian_lineage_names = {
                          row["nation"]
                          for row in (
                              history["opening"]
                              + history["events"]
                          )
                          if row["code"] == "RU"
                      }
                      self.assertNotIn(
                          "Russia",
                          russian_lineage_names,
                      )
                      if russian_lineage_names:
                          self.assertEqual(
                              russian_lineage_names,
                              {"Soviet Union"},
                          )

                  number_one = {
                      row["code"]: row
                      for row in self.summary[
                          "number_one_summary"
                      ]
                  }
                  self.assertEqual(
                      number_one["RU"]["nation"],
                      "Soviet Union",
                  )
                  self.assertEqual(
                      number_one["RU"]["included_names"],
                      [],
                  )
                  self.assertEqual(
                      number_one["DE"]["nation"],
                      "Germany",
                  )
                  self.assertIn(
                      "West Germany",
                      number_one["DE"]["included_names"],
                  )

                  for team in self.summary["teams"]:
                      self.assertTrue(team["lineage_names"])
          ''').strip() + "\n\n"

          test_name = (
              "test_record_filters_labels_and_major_tournament_default"
          )
          installed_test_pattern = re.compile(
              (
                  r"^    def "
                  + re.escape(test_name)
                  + r"\(self\) -> None:\n"
                  + r".*?(?=^    def |\Z)"
              ),
              flags=re.MULTILINE | re.DOTALL,
          )
          installed_matches = list(
              installed_test_pattern.finditer(tests)
          )
          replacement_test = textwrap.indent(
              test_method,
              "    ",
          )
          if len(installed_matches) > 1:
              raise RuntimeError(
                  "Multiple Records regression tests were found."
              )
          if installed_matches:
              tests = installed_test_pattern.sub(
                  replacement_test,
                  tests,
                  count=1,
              )
          else:
              marker = (
                  "    def test_public_metadata_and_discovery_files"
                  "(self) -> None:\n"
              )
              if tests.count(marker) != 1:
                  raise RuntimeError(
                      "Could not locate test insertion point."
                  )
              tests = tests.replace(
                  marker,
                  replacement_test + marker,
                  1,
              )

          if tests.count(
              "    def "
              "test_record_filters_labels_and_major_tournament_default"
          ) != 1:
              raise RuntimeError(
                  "Records regression test was not registered "
                  "as a StaticBuildTests method."
              )

          required_test_markers = (
              'self.assertIn("Soviet Union", names)',
              'self.assertNotIn("USSR", names)',
              '<option value="rank_change">Rank change</option>',
              'numberOneFilters.hidden = view !== "numberones";',
              'id="record-list-team"',
              "peakRecordLabel",
          )
          missing_test_markers = [
              marker
              for marker in required_test_markers
              if marker not in tests
          ]
          if missing_test_markers:
              raise RuntimeError(
                  "Test-contract migration incomplete; missing: "
                  + ", ".join(missing_test_markers)
              )


          required_app = (
              'id="peak-team-search"',
              'id="record-list-team"',
              'id="record-list-competition"',
              'peakFilters.hidden = view !== "peaks";',
              'numberOneFilters.hidden = view !== "numberones";',
              "listFilters.hidden = !pairViews.has(view);",
              "function defaultMajorTournamentFamily",
              "defaultMajorTournamentFamily(families)",
              "peakRecordLabel",
          )
          missing_app = [
              marker for marker in required_app
              if marker not in app
          ]
          if missing_app:
              raise RuntimeError(
                  "Records patch incomplete; missing: "
                  + ", ".join(missing_app)
              )

          required_builder = (
              "def model_verification_fingerprint",
              "def normalise_historical_public_names",
              "def attach_lineage_names",
              "names_at_number_one:",
              "verification_before = model_verification_fingerprint",
          )
          missing_builder = [
              marker for marker in required_builder
              if marker not in builder
          ]
          if missing_builder:
              raise RuntimeError(
                  "Build patch incomplete; missing: "
                  + ", ".join(missing_builder)
              )

          APP_PATH.write_text(
              app.rstrip() + "\n",
              encoding="utf-8",
          )
          BUILD_PATH.write_text(
              builder.rstrip() + "\n",
              encoding="utf-8",
          )
          TEST_PATH.write_text(
              tests.rstrip() + "\n",
              encoding="utf-8",
          )

          print(
              "Installed Records filters, date-correct Soviet labels, "
              "model/source integrity guard and major-tournament default."
          )
          PY

      - name: Preserve patched source files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/nfelo-records-patch
          cp public/assets/app.js \
            /tmp/nfelo-records-patch/app.js

      - name: Check source syntax
        run: |
          set -euo pipefail
          node --check public/assets/app.js
          python -m py_compile \
            scripts/build_site.py \
            tests/test_build.py
          python - <<'PY'
          import ast
          from pathlib import Path

          tree = ast.parse(
              Path("tests/test_build.py").read_text(
                  encoding="utf-8"
              )
          )
          test_class = next(
              node
              for node in tree.body
              if isinstance(node, ast.ClassDef)
              and node.name == "StaticBuildTests"
          )
          methods = {
              node.name
              for node in test_class.body
              if isinstance(
                  node,
                  (ast.FunctionDef, ast.AsyncFunctionDef),
              )
          }
          required = (
              "test_record_filters_labels_"
              "and_major_tournament_default"
          )
          if required not in methods:
              raise RuntimeError(
                  "Records regression test is not a class method."
              )
          print("Records regression test is registered.")
          PY

      - name: Build complete site
        run: |
          set -euo pipefail
          python scripts/build_site.py \
            --source source \
            --config config \
            --output public

      - name: Run complete validation
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          javascript = Path(
              "public/assets/app.js"
          ).read_text(encoding="utf-8")
          match = re.search(
              (
                  r"const MAJOR_TOURNAMENT_PRECEDENCE = "
                  r"\[(.*?)\];"
              ),
              javascript,
              flags=re.DOTALL,
          )
          if match is None:
              raise RuntimeError(
                  "Major tournament precedence array is missing."
              )
          actual = re.findall(r'"([^"]+)"', match.group(1))
          expected = [
              "FIFA World Cup",
              "UEFA European Championship",
              "Copa América",
              "Africa Cup of Nations",
              "AFC Asian Cup",
              "CONCACAF Gold Cup",
              "OFC Nations Cup",
          ]
          if actual != expected:
              raise RuntimeError(
                  "Unexpected major tournament precedence: "
                  + repr(actual)
              )
          print("Major tournament precedence:", actual)
          PY
          python -m unittest \
            tests.test_build.StaticBuildTests.test_record_filters_labels_and_major_tournament_default \
            --verbose
          python -m unittest discover \
            --start-directory tests \
            --verbose
          node --check public/assets/app.js
          if [ -f scripts/smoke_browser_boot.js ]; then
            node scripts/smoke_browser_boot.js public
          fi

      - name: Restore generated files and source data
        shell: bash
        run: |
          set -euo pipefail
          git restore --worktree -- public source
          git clean -fd -- public
          cp /tmp/nfelo-records-patch/app.js \
            public/assets/app.js

      - name: Check final patch scope
        shell: bash
        run: |
          set -euo pipefail

          node --check public/assets/app.js
          python -m py_compile \
            scripts/build_site.py \
            tests/test_build.py
          git diff --check

          changed="$(git status --short | awk '{print $2}' | sort)"
          expected="$(
            printf '%s\n' \
              public/assets/app.js \
              scripts/build_site.py \
              tests/test_build.py \
            | sort
          )"
          if [ "$changed" != "$expected" ]; then
            echo "Unexpected changed files:"
            printf '%s\n' "$changed"
            exit 1
          fi

          if git diff --name-only | grep -E \
            '^(source/|scripts/model.py|scripts/fetch_sources.py)'
          then
            echo "Source/model verification files must not change."
            exit 1
          fi

          grep -F \
            'id="record-list-team"' \
            public/assets/app.js
          grep -F \
            'function defaultMajorTournamentFamily' \
            public/assets/app.js
          grep -F \
            'def model_verification_fingerprint' \
            scripts/build_site.py
          grep -F \
            'test_record_filters_labels_and_major_tournament_default' \
            tests/test_build.py
          grep -F \
            'numberOneFilters.hidden = view !== "numberones";' \
            tests/test_build.py
          grep -F \
            'self.assertIn("Soviet Union", names)' \
            tests/test_build.py
          grep -F \
            '<option value="rank_change">Rank change</option>' \
            tests/test_build.py

      - name: Commit and push
        id: commit
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Records improvements are already installed."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            public/assets/app.js \
            scripts/build_site.py \
            tests/test_build.py

          git commit -m \
            "Improve Records filters and historical labels"
          git pull --rebase origin main
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Confirm deployment trigger
        if: steps.commit.outputs.changed == 'true'
        run: |
          echo "The push to main triggers the restored Pages workflow."
