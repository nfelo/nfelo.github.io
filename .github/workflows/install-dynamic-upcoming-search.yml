    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project dependencies
        run: python -m pip install -r requirements.txt

      - name: Install the update
        shell: bash
        run: |
          printf '%s' "$UPDATE_ARCHIVE" | tr -d '[:space:]' | base64 --decode > /tmp/network-football-elo-dynamic-fixture.tar.xz
          echo "4b1c8d65e90adf46c4e3b6ab386781c0bc3a410b897319d7f7fea3d8ea0eeadc  /tmp/network-football-elo-dynamic-fixture.tar.xz" | sha256sum --check
          tar -xJf /tmp/network-football-elo-dynamic-fixture.tar.xz -C "$GITHUB_WORKSPACE"

      - name: Validate JavaScript and Python
        run: |
          node --check public/assets/app.js
          python -m py_compile tests/test_build.py

      - name: Build the complete site
        run: python scripts/build_site.py --source source --config config --output public

      - name: Run all tests
        run: python -m unittest discover -s tests -v

      - name: Commit and push
        shell: bash
        run: |
          if git diff --quiet -- public/assets/app.js tests/test_build.py; then
            echo "The dynamic fixture-search update is already installed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/assets/app.js tests/test_build.py
          git commit -m "Use a current fixture as the upcoming-match search example"
          git push origin HEAD:main
