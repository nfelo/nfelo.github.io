name: Deploy date and venue improvements

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  deploy-files:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install and publish date and venue improvements
        env:
          UPDATE_ARCHIVE: >-
            
        run: |
          printf '%s' "$UPDATE_ARCHIVE" | base64 --decode > /tmp/network-football-elo-date-venue.tar.xz
          echo "cf16e16babd16ecee769fad16764802275a3470abfdb1deb062c352f9348ce03  /tmp/network-football-elo-date-venue.tar.xz" | sha256sum --check --strict
          tar -xJf /tmp/network-football-elo-date-venue.tar.xz
          node --check public/assets/app.js
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/model.py public/assets/app.js public/assets/styles.css tests/test_build.py
          git commit -m "Improve historical dates and match venue display"
          git push origin HEAD:main

      - name: Rebuild and deploy the site
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run pages.yml --ref main -f refresh_source=false
