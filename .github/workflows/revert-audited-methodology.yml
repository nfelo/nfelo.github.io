name: Revert audited methodology release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: revert-audited-methodology
  cancel-in-progress: true

jobs:
  revert:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Revert the audited methodology release
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git revert --no-commit ec333b162f613f3b8acf7ea987e7151f00ff1385

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check --requirement requirements.txt

      - name: Rebuild the restored site
        run: python scripts/build_site.py --source source --config config --output public

      - name: Test the restored site
        shell: bash
        run: |
          set -euo pipefail
          python -m unittest discover --start-directory tests --verbose
          node --check public/assets/app.js

      - name: Commit and publish the rollback
        shell: bash
        run: |
          set -euo pipefail
          git commit -m "Revert audited date-batch methodology"
          git restore --worktree .
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
