name: Refresh ratings and deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      refresh_source:
        description: Check eloratings.net before rebuilding
        type: boolean
        default: true
      full_refresh:
        description: Reconcile every active team page
        type: boolean
        default: false
  schedule:
    # After the main Americas, Asia/Oceania and Europe/Africa match windows.
    - cron: "20 6 * * *"
    - cron: "20 15 * * *"
    - cron: "20 23 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: network-football-elo-pages
  cancel-in-progress: false

