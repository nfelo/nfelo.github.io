name: Refresh ratings and deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      refresh_source:
        description: Check eloratings.net before rebuilding
        type: boolean
        default: true
      full_refresh:
        description: Reconcile every active team page
        type: boolean
        default: false
  schedule:
    - cron: "17 4 * * *"
    - cron: "17 18 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: network-football-elo-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install reproducible runtime
        run: python -m pip install --requirement requirements.txt

      - name: Daily source check
        if: github.event_name == 'schedule'
        run: |
          if compgen -G "source/elo_pages/*.tsv" > /dev/null; then
            python scripts/fetch_sources.py --source source --full-if-sunday
          else
            python scripts/fetch_sources.py --source source --full
          fi

      - name: Bootstrap source on first push
        if: github.event_name == 'push'
        run: |
          if ! compgen -G "source/elo_pages/*.tsv" > /dev/null; then
            python scripts/fetch_sources.py --source source --full
          fi

      - name: Manual source check
        if: github.event_name == 'workflow_dispatch' && inputs.refresh_source
        env:
          FULL_REFRESH: ${{ inputs.full_refresh }}
        run: |
          if [ "$FULL_REFRESH" = "true" ]; then
            python scripts/fetch_sources.py --source source --full
          else
            python scripts/fetch_sources.py --source source
          fi

      - name: Replay model and build static data
        run: python scripts/build_site.py --source source --config config --output public

      - name: Verify model, files and browser code
        run: |
          python -m unittest discover --start-directory tests --verbose
          node --check public/assets/app.js

      - name: Save validated source changes
        if: github.event_name == 'push' || github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.refresh_source)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add source
          if git diff --cached --quiet; then
            echo "No source change to commit."
          else
            git commit -m "chore(data): refresh World Football Elo source"
            git push || echo "::warning::Branch protection prevented the source snapshot commit."
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
