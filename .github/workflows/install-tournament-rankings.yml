          @media (max-width: 430px) {
            .tournament-toolbar { grid-template-columns: 1fr; }
            .tournament-toolbar .field:first-child { grid-column: auto; }
          }
          '''


          def patch_styles() -> None:
              text = STYLE_PATH.read_text(encoding="utf-8")
              marker = "/* Tournament snapshots */"
              if marker not in text:
                  text = text.rstrip() + STYLE_BLOCK + "\n"
              STYLE_PATH.write_text(text, encoding="utf-8")
              print("Added responsive tournament controls and cell movement styles.")


          TEST_BLOCK = r'''    def test_historical_rankings_and_tournaments_are_built(self) -> None:
