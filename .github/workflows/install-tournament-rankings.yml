      - name: Validate source syntax
        run: |
          set -euo pipefail
          python -m py_compile scripts/build_site.py
          node --check public/assets/app.js

      - name: Build static site
        run: python scripts/build_site.py --source source --config config --output public

      - name: Validate generated tournament catalog
        shell: bash
        run: |
          set -euo pipefail
          python <<'PY'
          import json
          from pathlib import Path

          catalog_path = Path("public/data/tournaments/index.json")
          catalog = json.loads(catalog_path.read_text(encoding="utf-8"))
          families = catalog.get("families", [])
          if not families:
              raise SystemExit("Tournament catalog contains no families")

          world_cup = next(
              (family for family in families if family["name"] == "FIFA World Cup"),
              None,
          )
          if world_cup is None or len(world_cup.get("editions", [])) < 20:
              raise SystemExit("World Cup editions were not built correctly")

          copa = next(
              (family for family in families if family["name"] == "Copa América"),
              None,
          )
          labels_1959 = [
              edition["label"]
              for edition in (copa or {}).get("editions", [])
              if edition["start"].startswith("1959-")
          ]
          if "March 1959" not in labels_1959:
              raise SystemExit("March 1959 Copa América edition is missing")
          if "December 1959" not in labels_1959:
              raise SystemExit("December 1959 Copa América edition is missing")

          print(
              f"Built {len(families)} tournament families across "
              f"{sum(len(family['editions']) for family in families)} editions."
          )
          PY

      - name: Run complete test suite
        run: python -m unittest discover --start-directory tests --verbose

      - name: Check changes
        run: |
          set -euo pipefail
          git diff --check --             scripts/build_site.py             public/index.html             public/assets/app.js             public/assets/styles.css             tests/test_build.py
          git diff --stat --             scripts/build_site.py             public/index.html             public/assets/app.js             public/assets/styles.css             tests/test_build.py

      - name: Commit and push implementation
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet --             scripts/build_site.py             public/index.html             public/assets/app.js             public/assets/styles.css             tests/test_build.py
          then
            echo "Tournament rankings are already installed."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email             "41898282+github-actions[bot]@users.noreply.github.com"

          git add             scripts/build_site.py             public/index.html             public/assets/app.js             public/assets/styles.css             tests/test_build.py

          git commit -m "Add tournament ranking snapshots"
          git push origin HEAD:main
