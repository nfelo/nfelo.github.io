          def validate_installation() -> None:
              build = BUILD_PATH.read_text(encoding="utf-8")
              app = APP_PATH.read_text(encoding="utf-8")
              html = HTML_PATH.read_text(encoding="utf-8")
              styles = STYLE_PATH.read_text(encoding="utf-8")
              tests = TEST_PATH.read_text(encoding="utf-8")

              required = {
                  "build": [
                      "def tournament_identity(",
                      "def build_tournament_catalog(",
                      'data / "tournaments" / "index.json"',
                      '"tournaments": ("Tournament rankings"',
                  ],
                  "app": [
                      "async function renderTournaments(route)",
                      "async function loadHistoricalSnapshot(index, value)",
                      "function tournamentRankingsTable",
                      'case "tournaments": await renderTournaments(current); break;',
                      'id="tournament-family"',
                      'id="tournament-edition"',
                      'id="tournament-view"',
                  ],
                  "html": ['href="#/tournaments">Tournaments</a>'],
                  "styles": ["/* Tournament snapshots */"],
                  "tests": [
                      "test_historical_rankings_and_tournaments_are_built",
                      "test_history_and_tournament_interfaces",
                  ],
              }

              contents = {
                  "build": build,
                  "app": app,
                  "html": html,
                  "styles": styles,
                  "tests": tests,
              }
              missing = [
                  f"{name}: {marker}"
                  for name, markers in required.items()
                  for marker in markers
                  if marker not in contents[name]
              ]
              if missing:
                  raise RuntimeError(
                      "Installation validation failed: " + "; ".join(missing)
                  )

              if 'id="history-world-cup"' in app:
                  raise RuntimeError(
                      "History still contains the old World Cup selector"
                  )
              if app.count("async function renderHistory(route)") != 1:
                  raise RuntimeError("Expected exactly one renderHistory function")
              if app.count("async function renderTournaments(route)") != 1:
                  raise RuntimeError("Expected exactly one renderTournaments function")

              print("Tournament page installation validated.")


          patch_build_script()
          patch_app()
          patch_html()
          patch_styles()
          patch_tests()
          validate_installation()
