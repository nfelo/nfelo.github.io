name: Correct tournament catalog and participants

on:
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write

concurrency:
  group: correct-tournament-catalog
  cancel-in-progress: false

jobs:
  correct:
    name: Fix tournament classification and tables
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project dependencies
        run: python -m pip install --requirement requirements.txt

      - name: Apply tournament corrections
        shell: bash
        run: |
          set -euo pipefail

          python <<'PY'
          from pathlib import Path


          BUILD_PATH = Path("scripts/build_site.py")
          APP_PATH = Path("public/assets/app.js")
          TEST_PATH = Path("tests/test_build.py")


          def replace_between(
              text: str,
              start_marker: str,
              end_marker: str,
              replacement: str,
              description: str,
          ) -> str:
              start = text.find(start_marker)
              if start < 0:
                  raise RuntimeError(f"Could not find start of {description}")

              end = text.find(end_marker, start)
              if end < 0:
                  raise RuntimeError(f"Could not find end of {description}")

              return (
                  text[:start]
                  + replacement.rstrip()
                  + "\n\n"
                  + text[end:]
              )


          TOURNAMENT_IDENTITY_BLOCK = r'''
          TOURNAMENT_CATEGORY_ORDER = {
              "Global championships": 0,
              "Continental championships": 1,
              "Nations leagues": 2,
              "Regional championships": 3,
              "Other tournaments": 4,
          }


          # Use source tournament codes for every known merged family. Display
          # names are not unique: several unrelated competitions contain names
          # such as "Gold Cup", and many qualifying events also mention the
          # tournament whose finals they lead to.
